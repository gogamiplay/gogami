<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>GOGAMI - Initial Setup Engine</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; font-family:-apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
        body { background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%); color: #f8fafc; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; }
        .setup-card { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 20px; padding: 30px; width: 100%; max-width: 440px; box-shadow: 0 20px 40px rgba(0,0,0,0.4); text-align: center; }
        .logo { font-size: 28px; font-weight: 900; letter-spacing: 3px; background: linear-gradient(45deg, #3b82f6, #10b981); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 10px; }
        .btn { width: 100%; padding: 14px; background: #3b82f6; border: none; border-radius: 12px; color: #fff; font-weight: 700; font-size: 15px; cursor: pointer; margin-top: 20px; transition: 0.2s; }
        .btn:active { transform: scale(0.98); }
        .status { margin-top: 15px; font-size: 13px; color: #94a3b8; line-height: 1.5; text-align: left; background: #0f172a; padding: 12px; border-radius: 10px; max-height: 150px; overflow-y: auto; font-family: monospace; }
    </style>
</head>
<body>
    <div class="setup-card">
        <div class="logo">GOGAMI</div>
        <p style="color:#94a3b8; font-size:14px;">Database Auto-Initialization</p>
        <button class="btn" onclick="runSetup()">Initialize Firestore Collections</button>
        <div class="status" id="statusLog">Ready to initialize...</div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBeGpb7V0i5GN1opY9JECHxQIGvHFDPX38",
            authDomain: "gogami-877be.firebaseapp.com",
            projectId: "gogami-877be",
            storageBucket: "gogami-877be.firebasestorage.app",
            messagingSenderId: "843686112399",
            appId: "1:843686112399:web:9c20a96831e6a94cd814fa"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        function log(msg) {
            const el = document.getElementById('statusLog');
            el.innerHTML += '<br>> ' + msg;
            el.scrollTop = el.scrollHeight;
        }

        async function runSetup() {
            log("Initializing GOGAMI DB...");
            try {
                await db.collection('settings').doc('upi').set({ upiId: 'gogami@axl' }, { merge: true });
                log("✔ UPI Settings set.");

                await db.collection('settings').doc('notice').set({ text: 'Welcome to GOGAMI! Fast & Secure Gaming Platform.' }, { merge: true });
                log("✔ Notice Board initialized.");

                await db.collection('settings').doc('rates').set({
                    'Single Digit': 10, 'Jodi': 100, 'Single Pana': 160,
                    'Double Pana': 320, 'Triple Pana': 1000, 'Half Sangam A': 1000,
                    'Half Sangam B': 1000, 'Full Sangam': 10000
                }, { merge: true });
                log("✔ Game Rates initialized.");

                log("🚀 Setup Finished Successfully!");
            } catch(e) {
                log("❌ Setup Error: " + e.message);
            }
        }
    </script>
</body>
</html>
