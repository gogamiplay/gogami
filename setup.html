<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GOGAMI - Supabase Setup Helper</title>
    <!-- ⚡ Fast & Reliable CDN -->
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: monospace; background: #0f172a; color: #38bdf8; padding: 20px; line-height: 1.6; }
        .box { background: #1e293b; border: 1px solid #334155; padding: 20px; border-radius: 10px; max-width: 600px; margin: auto; }
        button { background: #10b981; color: white; border: none; padding: 14px 20px; font-weight: bold; border-radius: 6px; cursor: pointer; width: 100%; margin-top: 15px; font-size: 16px; }
        #logs { background: #000; color: #4ade80; padding: 12px; margin-top: 15px; border-radius: 6px; min-height: 150px; font-size: 13px; white-space: pre-wrap; }
    </style>
</head>
<body>

<div class="box">
    <h2>🚀 Supabase Automated Initializer</h2>
    <p>Click the button below to start table initialization.</p>
    <button id="setupBtn" onclick="runDatabaseInit()">Setup Database Infrastructure</button>
    <div id="logs">> Checking system...</div>
</div>

<script>
    let dbClient;

    window.onload = function() {
        if (typeof supabase === 'undefined') {
            document.getElementById('logs').innerHTML += "<br><span style='color:red;'>❌ Error: Supabase Script Failed to Load! Check Internet or CDN.</span>";
        } else {
            const SUPABASE_URL = "https://lcrzohaqjzwjhsyncaim.supabase.co";
            const SUPABASE_ANON_KEY = "sb_publishable_2iAoTgXx8S5XeWy04oiICA_nedHJR_R";
            dbClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
            document.getElementById('logs').innerHTML = "> ✅ Supabase Connected Successfully!<br>> Ready to click button.";
        }
    };

    function log(msg) {
        document.getElementById('logs').innerHTML += "<br>> " + msg;
    }

    async function runDatabaseInit() {
        if (!dbClient) {
            alert("Supabase is not initialized. Check internet connection.");
            return;
        }

        log("Setting up settings & collections...");

        try {
            // 1. Setup default UPI ID
            await dbClient.from('settings').upsert({ id: 'upi', value: 'gogami@axl' });
            log("✅ 'settings' Collection initialized with default UPI.");

            // 2. Setup Notice
            await dbClient.from('settings').upsert({ id: 'notice', text: 'Welcome to GOGAMI Game Panel' });
            log("✅ Notice Settings initialized.");

            // 3. Dummy Market Test Record
            const { data: marketCheck, error: mErr } = await dbClient.from('markets').select('id').limit(1);
            
            if (mErr) {
                log("❌ Error fetching markets: " + mErr.message);
            } else if (!marketCheck || marketCheck.length === 0) {
                await dbClient.from('markets').insert([{
                    name: 'KALYAN NIGHT',
                    numbers: '120-3*-***',
                    open_bid_end: '21:00',
                    close_bid_end: '23:00',
                    status: 'open',
                    serial_no: 1,
                    open_pana: '120', open_digit: '3', close_pana: '***', close_digit: '*', jodi: '**'
                }]);
                log("✅ 'markets' Collection created with sample market.");
            } else {
                log("✅ 'markets' Collection already active.");
            }

            log("-----------------------------------------");
            log("🎉 Setup completed! Open admin.html now.");

        } catch (e) {
            log("❌ Setup Error: " + e.message);
        }
    }
</script>
</body>
</html>
