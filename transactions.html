<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>GOGAMI - Transactions</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
        body { background: #0f172a; color: #f8fafc; padding-bottom: 65px; min-height: 100vh; }
        .app-container { max-width: 480px; margin: 0 auto; background: #0f172a; min-height: 100vh; }
        
        .header { background: #1e293b; padding: 14px 16px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid rgba(255,255,255,0.08); }
        .logo { color: #3b82f6; font-size: 16px; font-weight: 800; letter-spacing: 1px; }
        .back-btn { background: none; border: none; color: #fff; font-size: 20px; cursor: pointer; }
        
        .history-item { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(10px); margin: 12px; padding: 14px; border-radius: 14px; border: 1px solid rgba(255,255,255,0.08); border-left: 4px solid #3b82f6; }
        .history-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
        .history-id { color: #3b82f6; font-size: 11px; font-family: monospace; font-weight: 700; }
        .history-amount { font-size: 18px; font-weight: 800; color: #fff; }
        .history-type { font-size: 11px; padding: 3px 8px; border-radius: 6px; display: inline-block; font-weight: 700; text-transform: uppercase; }
        .type-deposit { background: rgba(16, 185, 129, 0.2); color: #34d399; }
        .type-withdraw { background: rgba(239, 68, 68, 0.2); color: #f87171; }
        
        .status-approved { color: #34d399; font-weight: 700; }
        .status-completed { color: #34d399; font-weight: 700; }
        .status-rejected { color: #f87171; font-weight: 700; }
        .status-pending { color: #fbbf24; font-weight: 700; }
        
        .history-date { color: #64748b; font-size: 11px; margin-top: 8px; font-weight: 500; }
        .no-data { text-align: center; color: #64748b; padding: 60px 20px; font-size: 14px; }
    </style>
</head>
<body>
<div class="app-container">
    <div class="header">
        <button class="back-btn" onclick="goBack()">←</button>
        <div class="logo">GOGAMI TRANSACTIONS</div>
        <div></div>
    </div>
    <div id="historyList">
        <div style="text-align:center; padding:40px; color:#64748b; font-size:13px;">Loading transaction history...</div>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyBeGpb7V0i5GN1opY9JECHxQIGvHFDPX38",
        authDomain: "gogami-877be.firebaseapp.com",
        projectId: "gogami-877be",
        storageBucket: "gogami-877be.firebasestorage.app",
        messagingSenderId: "843686112399",
        appId: "1:843686112399:web:9c20a96831e6a94cd814fa"
    };
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.firestore();
    
    async function loadHistory() {
        let user = auth.currentUser;
        if (!user) { window.location.href = 'index.html'; return; }
        
        let transactions = await db.collection('transactions').where('userId', '==', user.uid).orderBy('date', 'desc').get();
        let withdrawals = await db.collection('withdrawRequests').where('userId', '==', user.uid).orderBy('date', 'desc').get();
        
        let container = document.getElementById('historyList');
        let html = '';
        
        for(let doc of withdrawals.docs) {
            let w = doc.data();
            let wDate = w.date?.toDate ? w.date.toDate().toLocaleDateString() : 'Pending';
            html += `<div class="history-item">
                <div class="history-header">
                    <span class="history-id">ID: ${doc.id.substring(0,15)}...</span>
                    <span class="history-amount">₹${w.amount}</span>
                </div>
                <div><span class="history-type type-withdraw">Withdrawal</span></div>
                <div style="font-size:12px; margin-top:4px; color:#94a3b8;">Status: <span class="status-${w.status?.toLowerCase()}">${w.status || 'PENDING'}</span></div>
                <div class="history-date">📅 ${wDate}</div>
            </div>`;
        }
        
        for(let doc of transactions.docs) {
            let t = doc.data();
            if(t.type === 'credit') {
                let tDate = t.date?.toDate ? t.date.toDate().toLocaleDateString() : 'Pending';
                html += `<div class="history-item">
                    <div class="history-header">
                        <span class="history-id">ID: ${doc.id.substring(0,15)}...</span>
                        <span class="history-amount">₹${t.amount}</span>
                    </div>
                    <div><span class="history-type type-deposit">Deposit</span></div>
                    <div style="font-size:12px; margin-top:4px; color:#94a3b8;">Status: <span class="status-${t.status?.toLowerCase()}">${t.status || 'PENDING'}</span></div>
                    <div class="history-date">📅 ${tDate}</div>
                </div>`;
            }
        }
        
        if(html === '') container.innerHTML = '<div class="no-data">No transactions found</div>';
        else container.innerHTML = html;
    }
    
    function goBack() { window.location.href = 'dashboard.html'; }
    auth.onAuthStateChanged(user => { if(!user) window.location.href = 'index.html'; else loadHistory(); });
</script>
</body>
</html>
