<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>GOGAMI - Transactions</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background: #1a1a2e; padding-bottom: 65px; }
        .app-container { max-width: 480px; margin: 0 auto; background: #1a1a2e; min-height: 100vh; }
        .header { background: linear-gradient(135deg, #e91e63, #9c27b0); padding: 12px 16px; display: flex; justify-content: space-between; align-items: center; }
        .logo { color: #fff; font-size: 18px; font-weight: bold; }
        .back-btn { background: none; border: none; color: #fff; font-size: 20px; cursor: pointer; }
        .history-item { background: #2a2a3e; margin: 10px; padding: 12px; border-radius: 16px; border-left: 3px solid #e91e63; }
        .history-header { display: flex; justify-content: space-between; margin-bottom: 8px; }
        .history-id { color: #e91e63; font-size: 10px; font-family: monospace; }
        .history-amount { font-size: 18px; font-weight: bold; color: #fff; }
        .history-type { font-size: 10px; padding: 2px 8px; border-radius: 12px; display: inline-block; }
        .type-deposit { background: #28a74520; color: #28a745; }
        .type-withdraw { background: #e91e6320; color: #e91e63; }
        .status-approved { color: #28a745; }
        .status-rejected { color: #dc3545; }
        .status-pending { color: #ff9800; }
        .history-date { color: #aaa; font-size: 10px; margin-top: 6px; }
        .no-data { text-align: center; color: #aaa; padding: 40px; }
    </style>
</head>
<body>
<div class="app-container">
    <div class="header"><button class="back-btn" onclick="goBack()">←</button><div class="logo">🌸 TRANSACTIONS</div><div></div></div>
    <div id="historyList"></div>
</div>

<script>
    const firebaseConfig = { 
        apiKey: "AIzaSyDLZdlEN9SEb6Z4dsuuMGsRNIzVBMwky_c", 
        authDomain: "gogami-877be.firebaseapp.com", 
        projectId: "gogami-877be", 
        storageBucket: "gogami-877be.firebasestorage.app", 
        messagingSenderId: "220921167245", 
        appId: "1:220921167245:web:3ccc8b424e5bc927c291c4",
        measurementId: "G-2Q572T3D8J"
    };
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.firestore();
    auth.setPersistence(firebase.auth.Auth.Persistence.LOCAL);
    
    async function loadHistory() {
        let user = auth.currentUser;
        if (!user) { window.location.href = 'index.html'; return; }
        
        let container = document.getElementById('historyList');
        container.innerHTML = '<div class="no-data">Loading history...</div>';
        
        try {
            let transactions = await db.collection('transactions').where('userId', '==', user.uid).get();
            let withdrawals = await db.collection('withdrawRequests').where('userId', '==', user.uid).get();
            
            let html = '';
            
            for(let doc of withdrawals.docs) {
                let w = doc.data();
                let dateStr = w.date?.toDate ? w.date.toDate().toLocaleDateString() : (w.date?.seconds ? new Date(w.date.seconds * 1000).toLocaleDateString() : 'Pending');
                html += `<div class="history-item"><div class="history-header"><span class="history-id">ID ${doc.id.substring(0,15)}...</span><span class="history-amount">₹${w.amount}</span></div><div><span class="history-type type-withdraw">Withdrawal</span></div><div>Status: <span class="status-${(w.status || 'pending').toLowerCase()}">${w.status || 'PENDING'}</span></div><div class="history-date">📅 ${dateStr}</div></div>`;
            }
            
            for(let doc of transactions.docs) {
                let t = doc.data();
                if(t.type === 'credit') {
                    let dateStr = t.date?.toDate ? t.date.toDate().toLocaleDateString() : (t.date?.seconds ? new Date(t.date.seconds * 1000).toLocaleDateString() : 'Pending');
                    html += `<div class="history-item"><div class="history-header"><span class="history-id">ID ${doc.id.substring(0,15)}...</span><span class="history-amount">₹${t.amount}</span></div><div><span class="history-type type-deposit">Deposit</span></div><div>Status: <span class="status-${(t.status || 'pending').toLowerCase()}">${t.status || 'PENDING'}</span></div><div class="history-date">📅 ${dateStr}</div></div>`;
                }
            }
            
            if(html === '') container.innerHTML = '<div class="no-data">🌸 No transactions found</div>';
            else container.innerHTML = html;
        } catch(e) {
            container.innerHTML = `<div class="no-data">Error loading history: ${e.message}</div>`;
        }
    }
    
    function goBack() { window.location.href = 'dashboard.html'; }
    auth.onAuthStateChanged(user => { if(!user) window.location.href = 'index.html'; else loadHistory(); });
</script>
</body>
</html>
