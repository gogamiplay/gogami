<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>GOMAGI - User Bid Details</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <style>
        * { 
            margin: 0; 
            padding: 0; 
            box-sizing: border-box; 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; 
            -webkit-tap-highlight-color: transparent;
            -webkit-user-select: none;
            user-select: none;
            outline: none;
            border: none;
        }

        body { 
            background: #090d16; 
            color: #f8fafc; 
            padding-bottom: 30px; 
            min-height: 100vh;
        }

        .container { 
            max-width: 1000px; 
            margin: 0 auto; 
            padding: 14px; 
        }

        .back-btn { 
            background: #151c2c; 
            color: #cbd5e1; 
            border: none; 
            padding: 10px 18px; 
            border-radius: 10px; 
            cursor: pointer; 
            margin-bottom: 14px; 
            font-size: 12px; 
            font-weight: 700; 
            text-transform: uppercase; 
            letter-spacing: 0.5px; 
        }

        .back-btn:active { background: #1e293b; }

        /* Header Card */
        .header { 
            background: #0f172a; 
            padding: 16px 18px; 
            border-radius: 16px; 
            margin-bottom: 14px; 
            color: #fff; 
            border: 1px solid rgba(255,255,255,0.05);
        }

        .header h1 { 
            color: #f8fafc; 
            font-size: 16px; 
            font-weight: 800; 
            margin-bottom: 6px; 
            text-transform: uppercase;
        }

        .header p { 
            color: #94a3b8; 
            font-size: 12px; 
            font-weight: 600; 
            margin-top: 2px; 
        }

        /* Stats Grid */
        .stats { 
            display: grid; 
            grid-template-columns: repeat(4, 1fr); 
            gap: 10px; 
            margin-bottom: 14px; 
        }

        .stat-card { 
            background: #151c2c; 
            padding: 12px 10px; 
            border-radius: 14px; 
            text-align: center; 
        }

        .stat-card .label { 
            color: #64748b; 
            font-size: 10px; 
            font-weight: 700; 
            text-transform: uppercase; 
            letter-spacing: 0.5px; 
            margin-bottom: 4px; 
        }

        .stat-card .value { 
            color: #f8fafc; 
            font-size: 16px; 
            font-weight: 800; 
        }

        .stat-card .value.positive { color: #10b981; }
        .stat-card .value.negative { color: #f87171; }

        /* Filter Controls */
        .filters { 
            display: flex; 
            gap: 8px; 
            margin-bottom: 14px; 
            flex-wrap: wrap; 
            align-items: center; 
        }

        .filter-select { 
            padding: 10px 12px; 
            border-radius: 10px; 
            background: #151c2c; 
            font-size: 12px; 
            font-weight: 600; 
            color: #f8fafc; 
            outline: none; 
            -webkit-user-select: text;
            user-select: text;
        }

        .search-input { 
            flex: 1; 
            padding: 10px 14px; 
            border-radius: 10px; 
            background: #151c2c;
            min-width: 160px; 
            font-size: 12px; 
            font-weight: 600; 
            color: #fff;
            -webkit-user-select: text;
            user-select: text;
        }

        .refresh-btn { 
            background: #2563eb; 
            color: #fff; 
            border: none; 
            padding: 10px 16px; 
            border-radius: 10px; 
            cursor: pointer; 
            font-size: 12px; 
            font-weight: 700; 
            text-transform: uppercase; 
        }

        .refresh-btn:active { background: #1d4ed8; }

        /* Table Box */
        .bids-table { 
            background: #151c2c; 
            border-radius: 16px; 
            overflow-x: auto; 
        }

        table { 
            width: 100%; 
            border-collapse: collapse; 
            min-width: 800px; 
        }

        th { 
            background: #0f172a; 
            padding: 12px 10px; 
            text-align: left; 
            font-weight: 700; 
            color: #64748b; 
            font-size: 11px; 
            text-transform: uppercase; 
            letter-spacing: 0.5px; 
        }

        td { 
            padding: 12px 10px; 
            border-bottom: 1px solid rgba(255,255,255,0.03); 
            color: #f8fafc; 
            font-size: 12px; 
            font-weight: 600; 
        }

        tr:last-child td { border-bottom: none; }

        .bid-id-text {
            color: #3b82f6;
            font-family: monospace;
            font-size: 11px;
        }

        .status-won { color: #34d399; font-weight: 800; }
        .status-lost { color: #f87171; font-weight: 800; }
        .status-pending { color: #fbbf24; font-weight: 800; }

        .bid-type-open { background: rgba(16, 185, 129, 0.15); color: #34d399; padding: 3px 6px; border-radius: 4px; font-size: 10px; font-weight: 800; }
        .bid-type-close { background: rgba(245, 158, 11, 0.15); color: #fbbf24; padding: 3px 6px; border-radius: 4px; font-size: 10px; font-weight: 800; }
        .no-data { text-align: center; padding: 40px; color: #64748b; font-size: 13px; font-weight: 600; }

        @media (max-width: 768px) { 
            .stats { grid-template-columns: repeat(2, 1fr); } 
            th, td { padding: 10px 8px; font-size: 11px; } 
        }
    </style>
</head>
<body>
<div class="container">
    <button class="back-btn" onclick="window.close()">← Close Monitor</button>
    <div class="header">
        <h1 id="userName">Loading Profile...</h1>
        <p id="userPhone">📞 Phone: Loading...</p>
        <p id="userBalance">💰 Balance: ₹0</p>
    </div>
    
    <div class="stats">
        <div class="stat-card"><div class="label">Total Bids</div><div class="value" id="totalBids">0</div></div>
        <div class="stat-card"><div class="label">Total Spent</div><div class="value" id="totalSpent">₹0</div></div>
        <div class="stat-card"><div class="label">Total Won</div><div class="value positive" id="totalWon">₹0</div></div>
        <div class="stat-card"><div class="label">Net Profit/Loss</div><div class="value" id="netProfit">₹0</div></div>
    </div>
    
    <div class="filters">
        <select id="statusFilter" class="filter-select" onchange="filterBids()">
            <option value="all">All Status</option>
            <option value="won">Won</option>
            <option value="lost">Lost</option>
            <option value="pending">Pending</option>
        </select>
        <select id="gameTypeFilter" class="filter-select" onchange="filterBids()">
            <option value="all">All Games</option>
            <option value="Single Digit">Single Digit</option>
            <option value="Jodi">Jodi</option>
            <option value="Single Pana">Single Pana</option>
            <option value="Double Pana">Double Pana</option>
            <option value="Triple Pana">Triple Pana</option>
            <option value="Half Sangam A">Half Sangam A</option>
            <option value="Half Sangam B">Half Sangam B</option>
            <option value="Full Sangam">Full Sangam</option>
        </select>
        <input type="text" id="searchInput" class="search-input" placeholder="🔍 Search market or number..." onkeyup="filterBids()">
        <button class="refresh-btn" onclick="refreshData()">Refresh</button>
    </div>
    
    <div class="bids-table">
        <table>
            <thead>
                <tr>
                    <th>Bidding ID</th>
                    <th>Date & Time</th>
                    <th>Market</th>
                    <th>Session</th>
                    <th>Game</th>
                    <th>Number</th>
                    <th>Points</th>
                    <th>Rate</th>
                    <th>Possible Win</th>
                    <th>Status</th>
                </tr>
            </thead>
            <tbody id="bidsList">
                <tr><td colspan="10" class="no-data">Loading user placements...</td></tr>
            </tbody>
        </table>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyDLZdlEN9SEb6Z4dsuuMGsRNIzVBMwky_c",
        authDomain: "gogami-877be.firebaseapp.com",
        databaseURL: "https://gogami-877be-default-rtdb.firebaseio.com",
        projectId: "gogami-877be",
        storageBucket: "gogami-877be.firebasestorage.app",
        messagingSenderId: "220921167245",
        appId: "1:220921167245:web:3ccc8b424e5bc927c291c4",
        measurementId: "G-2Q572T3D8J"
    };

    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.firestore();
    
    const gameRates = { 'Single Digit':10, 'Jodi':100, 'Single Pana':160, 'Double Pana':320, 'Triple Pana':1000, 'Half Sangam A':1000, 'Half Sangam B':1000, 'Full Sangam':10000 };
    let allBids = [], userId = null, userName = "";
    
    const urlParams = new URLSearchParams(window.location.search);
    userId = urlParams.get('uid');
    userName = urlParams.get('name') || 'User';

    if (userId) { 
        document.getElementById('userName').innerHTML = `👤 User: ${escapeHtml(userName)}`; 
        init(); 
    } else { 
        document.getElementById('userName').innerHTML = '❌ No User Selected'; 
        document.getElementById('bidsList').innerHTML = '<tr><td colspan="10" class="no-data">No user ID provided</td></tr>'; 
    }
    
    async function init() { await loadUserData(); await loadBids(); listenToBidUpdates(); }
    
    async function loadUserData() { 
        if(!userId) return; 
        try { 
            let userDoc = await db.collection('users').doc(userId).get(); 
            if(userDoc.exists) { 
                let ud = userDoc.data(); 
                document.getElementById('userPhone').innerHTML = `📞 Phone: ${ud.phone || 'Not provided'}`; 
                document.getElementById('userBalance').innerHTML = `💰 Wallet: ₹${(ud.balance || 0).toLocaleString()}`; 
            } 
        } catch(e) { console.error(e); } 
    }
    
    async function loadBids() { 
        if(!userId) return; 
        document.getElementById('bidsList').innerHTML = '<tr><td colspan="10" class="no-data">Loading...</td></tr>'; 
        try { 
            let snapshot = await db.collection('bids').where('userId', '==', userId).get(); 
            allBids = []; 
            snapshot.forEach(doc => { 
                let b = doc.data(); 
                let bidDate = b.createdAt?.toDate ? b.createdAt.toDate() : (b.createdAt?.seconds ? new Date(b.createdAt.seconds*1000) : new Date(0)); 
                allBids.push({ id: doc.id, ...b, dateObj: bidDate, bidType: b.bidType || null }); 
            }); 
            allBids.sort((a,b) => b.dateObj - a.dateObj); 
            if(allBids.length === 0) document.getElementById('bidsList').innerHTML = '<tr><td colspan="10" class="no-data">No bids found for this user</td></tr>'; 
            updateStats(); 
            filterBids(); 
        } catch(e) { document.getElementById('bidsList').innerHTML = `<tr><td colspan="10" class="no-data">❌ Error: ${e.message}</td></tr>`; } 
    }
    
    function filterBids() { 
        let status = document.getElementById('statusFilter').value;
        let game = document.getElementById('gameTypeFilter').value;
        let search = document.getElementById('searchInput').value.trim().toLowerCase(); 
        let filtered = [...allBids]; 
        
        if(status !== 'all') filtered = filtered.filter(b => b.status === status); 
        if(game !== 'all') filtered = filtered.filter(b => (b.gameType || b.type) === game); 
        if(search) filtered = filtered.filter(b => (b.market||'').toLowerCase().includes(search) || (b.value||'').toLowerCase().includes(search) || b.id.toLowerCase().includes(search)); 
        
        displayBidsTable(filtered); 
    }
    
    function displayBidsTable(bids){ 
        let tbody = document.getElementById('bidsList'); 
        if(bids.length === 0){ tbody.innerHTML = '<tr><td colspan="10" class="no-data">No bids match your filters</td></tr>'; return; } 
        let html = ''; 
        for(let b of bids){ 
            let dateStr = b.dateObj && b.dateObj.getTime() > 0 ? b.dateObj.toLocaleString() : 'Unknown'; 
            let gameDisplay = b.gameType || b.type || '-';
            let rate = gameRates[gameDisplay] || 10; 
            let possibleWin = (b.points || 0) * rate; 
            let statusClass = b.status === 'won' ? 'status-won' : (b.status === 'lost' ? 'status-lost' : 'status-pending'); 
            let statusText = b.status ? b.status.toUpperCase() : 'PENDING'; 
            let bidTypeBadge = b.bidType ? (b.bidType === 'Open' ? '<span class="bid-type-open">OPEN</span>' : '<span class="bid-type-close">CLOSE</span>') : '<span style="color:#64748b;">—</span>'; 
            
            html += `<tr>
                <td class="bid-id-text">#${b.id.substring(0, 8).toUpperCase()}</td>
                <td>${dateStr}</td>
                <td>${escapeHtml(b.market||'Unknown')}</td>
                <td>${bidTypeBadge}</td>
                <td>${escapeHtml(gameDisplay)}</td>
                <td><strong style="font-family:monospace; font-size:13px; color:#f87171;">${escapeHtml(b.value||'-')}</strong></td>
                <td style="color:#10b981;">₹${(b.points||0).toLocaleString()}</td>
                <td>${rate}x</td>
                <td>₹${possibleWin.toLocaleString()}</td>
                <td class="${statusClass}">${statusText}</td>
            </tr>`; 
        } 
        tbody.innerHTML = html; 
    }
    
    function updateStats(){ 
        let total = allBids.length, spent = 0, won = 0; 
        for(let b of allBids){ 
            spent += b.points || 0; 
            if(b.status === 'won'){ 
                let gameDisplay = b.gameType || b.type || '-';
                let rate = gameRates[gameDisplay] || 10; 
                won += (b.points || 0) * rate; 
            } 
        } 
        let net = won - spent; 
        document.getElementById('totalBids').innerHTML = total; 
        document.getElementById('totalSpent').innerHTML = `₹${spent.toLocaleString()}`; 
        document.getElementById('totalWon').innerHTML = `₹${won.toLocaleString()}`; 
        let netEl = document.getElementById('netProfit'); 
        netEl.innerHTML = `₹${net.toLocaleString()}`; 
        netEl.className = 'value ' + (net > 0 ? 'positive' : (net < 0 ? 'negative' : '')); 
    }
    
    function escapeHtml(str){ if(!str) return ''; return str.replace(/[&<>]/g, function(m){ if(m==='&') return '&amp;'; if(m==='<') return '&lt;'; if(m==='>') return '&gt;'; return m; }); }
    async function refreshData(){ await loadUserData(); await loadBids(); }
    function listenToBidUpdates(){ if(!userId) return; db.collection('bids').where('userId','==',userId).onSnapshot(()=>{ loadBids(); }); }
    
    window.filterBids = filterBids; 
    window.refreshData = refreshData;
</script>
</body>
</html>
