<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>GOGAMI - Admin Panel</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
        body { background: #0f172a; color: #f8fafc; display: flex; flex-direction: column; min-height: 100vh; overflow-x: hidden; }
        
        .login-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #0f172a; display: flex; justify-content: center; align-items: center; z-index: 2000; }
        .login-card { background: #1e293b; padding: 32px; border-radius: 16px; width: 90%; max-width: 340px; text-align: center; border: 1px solid #334155; box-shadow: 0 10px 25px rgba(0,0,0,0.3); }
        
        .app-title-animated {
            font-weight: 800; font-size: 22px; letter-spacing: 2px; margin-bottom: 24px; display: inline-block;
            background: linear-gradient(45deg, #3b82f6, #ef4444, #10b981, #f59e0b, #3b82f6);
            background-size: 400% 400%; -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            animation: gradientShift 8s ease infinite;
        }
        @keyframes gradientShift { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }

        .login-card input { width: 100%; padding: 12px 14px; margin: 12px 0; border: 1px solid #334155; background: #0f172a; border-radius: 8px; color: #fff; font-size: 14px; outline: none; }
        .login-card button { width: 100%; padding: 12px; background: #3b82f6; border: none; border-radius: 8px; color: #fff; font-weight: 700; cursor: pointer; text-transform: uppercase; letter-spacing: 0.5px; }
        
        .admin-panel { display: flex; flex-direction: column; width: 100%; min-height: 100vh; }
        .mobile-header { background: #1e293b; padding: 14px; border-bottom: 1px solid #334155; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 1000; }
        .sidebar { background: #1e293b; border-bottom: 1px solid #334155; display: flex; overflow-x: auto; white-space: nowrap; padding: 8px; gap: 8px; -webkit-overflow-scrolling: touch; }
        .sidebar-item { padding: 10px 14px; color: #94a3b8; cursor: pointer; border-radius: 8px; font-size: 13px; font-weight: 600; display: inline-flex; align-items: center; gap: 6px; background: #0f172a; border: 1px solid #334155; }
        .sidebar-item.active { background: #3b82f6; color: #fff; border-color: #3b82f6; }
        .notification-badge { background: #ef4444; color: #fff; border-radius: 6px; padding: 2px 6px; font-size: 10px; font-weight: 700; }
        
        .main-content { padding: 16px; flex: 1; background: #0f172a; min-height: calc(100vh - 120px); }
        .card { background: #1e293b; border-radius: 14px; padding: 16px; margin-bottom: 16px; border: 1px solid #334155; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); }
        .card h3 { margin-bottom: 14px; color: #f8fafc; font-size: 14px; font-weight: 700; letter-spacing: 0.5px; text-transform: uppercase; border-left: 4px solid #3b82f6; padding-left: 10px; }
        
        input, select, textarea { padding: 10px; margin: 4px 0; border: 1px solid #334155; background: #0f172a; border-radius: 8px; width: 100%; color: #fff; font-size: 13px; font-weight: 500; outline: none; }
        input:focus, select:focus, textarea:focus { border-color: #3b82f6; }
        label { font-size: 11px; font-weight: 700; color: #94a3b8; text-transform: uppercase; display: block; margin-top: 6px; }
        
        button { background: #3b82f6; border: none; padding: 10px 14px; border-radius: 8px; color: #fff; font-weight: 700; cursor: pointer; margin: 4px 2px; font-size: 12px; text-transform: uppercase; letter-spacing: 0.5px; }
        
        .market-item, .user-item, .request-item { background: #1a2238; padding: 14px; margin: 10px 0; border-radius: 10px; border: 1px solid #334155; }
        .market-header-row { display: flex; justify-content: space-between; align-items: center; cursor: pointer; background: #0f172a; padding: 10px; border-radius: 8px; border: 1px solid #334155; font-size: 13px; }
        .market-detail-row { display: none; background: #1e293b; padding: 12px; border-radius: 8px; margin-top: 8px; border: 1px solid #334155; }
        .market-detail-row.open { display: block; }
        
        .status-badge { padding: 3px 8px; border-radius: 4px; font-size: 10px; font-weight: 700; text-transform: uppercase; }
        .status-open { background: rgba(16, 185, 129, 0.15); color: #34d399; }
        .status-close { background: rgba(245, 158, 11, 0.15); color: #fbbf24; }
        .status-closed { background: rgba(239, 68, 68, 0.15); color: #f87171; }
        
        .btn-success { background: #10b981; }
        .btn-danger { background: #ef4444; }
        .btn-warning { background: #f59e0b; color: #0f172a; }
        .btn-reset { background: #475569; }
        .btn-info { background: #0ea5e9; }
        .btn-delete { background: #7f1d1d; color: #fca5a5; }
        .hidden { display: none !important; }
        
        .user-status { font-size: 9px; padding: 2px 5px; border-radius: 4px; font-weight: 700; margin-left: 6px; }
        .status-online { background: rgba(16, 185, 129, 0.2); color: #34d399; }
        .status-offline { background: rgba(148, 163, 184, 0.2); color: #94a3b8; }

        @media (min-width: 768px) {
            .admin-panel { flex-direction: row; }
            .mobile-header { display: none; }
            .sidebar { width: 240px; min-height: 100vh; flex-direction: column; position: fixed; }
            .main-content { margin-left: 240px; padding: 24px; }
        }
    </style>
</head>
<body>

<div id="loginScreen" class="login-screen">
    <div class="login-card">
        <span class="app-title-animated">GOGAMI ADMIN</span>
        <input type="password" id="adminPass" placeholder="Enter Password">
        <button onclick="login()">Sign In</button>
        <div id="loginError" style="color:#f87171; margin-top:12px; font-size:13px;"></div>
    </div>
</div>

<div id="adminPanel" class="admin-panel" style="display:none;">
    <div class="mobile-header">
        <span class="app-title-animated" style="font-size:16px; margin:0;">GOGAMI ADMIN</span>
        <button onclick="logout()" class="btn-danger" style="padding:6px 10px; font-size:10px;">Logout</button>
    </div>

    <div class="sidebar">
        <div class="sidebar-item active" onclick="showSection('markets')">🎮 Markets</div>
        <div class="sidebar-item" onclick="showSection('users')">👥 Users</div>
        <div class="sidebar-item" onclick="showSection('deposits')">💰 Deposits <span id="depositBadge" class="notification-badge" style="display:none;">0</span></div>
        <div class="sidebar-item" onclick="showSection('withdrawals')">💸 Withdrawals <span id="withdrawalBadge" class="notification-badge" style="display:none;">0</span></div>
    </div>

    <div class="main-content">
        <div id="marketsSection">
            <div class="card">
                <h3>➕ Add New Market</h3>
                <input type="text" id="marketNameInput" placeholder="Market Name">
                <input type="text" id="marketNumbersInput" placeholder="Numbers (e.g., 440-8*-***)">
                <button onclick="addMarket()">Add Market</button>
            </div>
            <div class="card">
                <h3>📋 Manage Markets</h3>
                <div id="marketsList">Loading...</div>
            </div>
        </div>

        <div id="usersSection" class="hidden">
            <div class="card">
                <h3>👥 Users Management</h3>
                <div id="usersList">Loading...</div>
            </div>
        </div>

        <div id="depositsSection" class="hidden">
            <div class="card">
                <h3>💰 Deposit Requests</h3>
                <div id="depositsList">Loading...</div>
            </div>
        </div>

        <div id="withdrawalsSection" class="hidden">
            <div class="card">
                <h3>💸 Withdrawal Requests</h3>
                <div id="withdrawalsList">Loading...</div>
            </div>
        </div>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyBeGpb7V0i5GN1opY9JECHxQIGvHFDPX38",
        authDomain: "gogami-877be.firebaseapp.com",
        projectId: "gogami-877be",
        storageBucket: "gogami-877be.firebasestorage.app",
        messagingSenderId: "843686112399",
        appId: "1:843686112399:web:9c20a96831e6a94cd814fa"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();
    let dbPassword = "Gani99@@";

    function login() {
        let pwd = document.getElementById('adminPass').value;
        if (pwd === dbPassword) {
            sessionStorage.setItem('adminLoggedIn', 'true');
            document.getElementById('loginScreen').style.display = 'none';
            document.getElementById('adminPanel').style.display = 'flex';
            loadMarkets(); loadUsers(); loadDeposits(); loadWithdrawals();
        } else {
            document.getElementById('loginError').innerText = 'Invalid Admin Password!';
        }
    }

    if (sessionStorage.getItem('adminLoggedIn') === 'true') {
        document.getElementById('loginScreen').style.display = 'none';
        document.getElementById('adminPanel').style.display = 'flex';
        loadMarkets(); loadUsers(); loadDeposits(); loadWithdrawals();
    }

    // 🟢 Realtime Market Sync
    function loadMarkets() {
        db.collection('markets').orderBy('serialNo', 'asc').onSnapshot(snapshot => {
            let html = '';
            snapshot.forEach(doc => {
                let m = doc.data();
                html += `<div class="market-item">
                    <b>${m.name}</b> (${m.numbers || '***'}) - <span class="status-badge status-${m.status}">${m.status}</span>
                    <button onclick="deleteMarket('${doc.id}')" class="btn-danger" style="float:right;">Delete</button>
                </div>`;
            });
            document.getElementById('marketsList').innerHTML = html || 'No markets found';
        });
    }

    async function addMarket() {
        let name = document.getElementById('marketNameInput').value;
        let numbers = document.getElementById('marketNumbersInput').value || '***-**-***';
        if (!name) { alert('Enter market name'); return; }

        let markets = await db.collection('markets').get();
        await db.collection('markets').add({
            name: name,
            numbers: numbers,
            status: 'open',
            serialNo: markets.size + 1,
            createdAt: firebase.firestore.FieldValue.serverTimestamp()
        });

        document.getElementById('marketNameInput').value = '';
        document.getElementById('marketNumbersInput').value = '';
        alert('Market added successfully!');
    }

    async function deleteMarket(id) {
        if (confirm('Delete market?')) {
            await db.collection('markets').doc(id).delete();
        }
    }

    // 🟢 Realtime Users Balance & Sync
    function loadUsers() {
        db.collection('users').onSnapshot(snapshot => {
            let html = '';
            snapshot.forEach(doc => {
                let u = doc.data();
                let online = u.isOnline === true;
                html += `<div class="user-item">
                    <b>${u.name || 'User'}</b> (${u.phone || 'N/A'}) 
                    <span class="user-status ${online ? 'status-online' : 'status-offline'}">${online ? 'ONLINE' : 'OFFLINE'}</span><br>
                    Balance: ₹${u.balance || 0}
                    <div style="margin-top:6px;">
                        <button onclick="updateBalance('${doc.id}', 'add')" class="btn-success">➕ Add</button>
                        <button onclick="updateBalance('${doc.id}', 'remove')" class="btn-danger">➖ Remove</button>
                    </div>
                </div>`;
            });
            document.getElementById('usersList').innerHTML = html || 'No users';
        });
    }

    async function updateBalance(uid, action) {
        let amt = prompt(`Enter amount to ${action.toUpperCase()}:`);
        if (!amt || isNaN(amt) || Number(amt) <= 0) return;

        let amtNum = Number(amt);
        let userRef = db.collection('users').doc(uid);
        let userSnap = await userRef.get();

        if (userSnap.exists) {
            let currentBal = Number(userSnap.data().balance) || 0;
            let newBal = action === 'add' ? (currentBal + amtNum) : (currentBal - amtNum);

            await userRef.set({ balance: newBal }, { merge: true });
            await db.collection('transactions').add({
                userId: uid,
                type: action === 'add' ? 'credit' : 'debit',
                amount: amtNum,
                status: 'Completed',
                date: firebase.firestore.FieldValue.serverTimestamp()
            });

            alert(`Balance updated! Current balance: ₹${newBal}`);
        }
    }

    function loadDeposits() {
        db.collection('transactions').where('type', '==', 'credit').where('status', '==', 'Pending').onSnapshot(snapshot => {
            let html = '';
            snapshot.forEach(doc => {
                let d = doc.data();
                html += `<div class="request-item">
                    Amount: ₹${d.amount} | UTR: ${d.utr || 'N/A'}
                    <button onclick="approveDeposit('${doc.id}', ${d.amount}, '${d.userId}')" class="btn-success">Approve</button>
                </div>`;
            });
            document.getElementById('depositsList').innerHTML = html || 'No pending deposits';
        });
    }

    async function approveDeposit(transId, amount, uid) {
        let userRef = db.collection('users').doc(uid);
        let userSnap = await userRef.get();
        let currentBal = Number(userSnap.data()?.balance) || 0;

        await userRef.set({ balance: currentBal + Number(amount) }, { merge: true });
        await db.collection('transactions').doc(transId).update({ status: 'Completed' });
        alert('Deposit Approved!');
    }

    function loadWithdrawals() {
        db.collection('withdrawRequests').where('status', '==', 'Pending').onSnapshot(snapshot => {
            let html = '';
            snapshot.forEach(doc => {
                let w = doc.data();
                html += `<div class="request-item">
                    Amount: ₹${w.amount}
                    <button onclick="approveWithdrawal('${doc.id}', ${w.amount}, '${w.userId}')" class="btn-success">Approve</button>
                </div>`;
            });
            document.getElementById('withdrawalsList').innerHTML = html || 'No pending withdrawals';
        });
    }

    async function approveWithdrawal(id, amount, uid) {
        let userRef = db.collection('users').doc(uid);
        let userSnap = await userRef.get();
        let currentBal = Number(userSnap.data()?.balance) || 0;

        if (currentBal >= Number(amount)) {
            await userRef.set({ balance: currentBal - Number(amount) }, { merge: true });
            await db.collection('withdrawRequests').doc(id).update({ status: 'Completed' });
            alert('Withdrawal Approved!');
        } else {
            alert('Insufficient User Balance!');
        }
    }

    function showSection(sec) {
        ['markets', 'users', 'deposits', 'withdrawals'].forEach(s => document.getElementById(`${s}Section`).classList.add('hidden'));
        document.getElementById(`${sec}Section`).classList.remove('hidden');
    }

    function logout() {
        sessionStorage.removeItem('adminLoggedIn');
        location.reload();
    }
</script>
</body>
</html>
