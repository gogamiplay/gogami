<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>GOMAGI - Admin Live Support</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-storage-compat.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            -webkit-tap-highlight-color: transparent;
            outline: none;
            border: none;
        }

        body {
            background: #0f172a;
            color: #f8fafc;
            height: 100vh;
            display: flex;
            overflow: hidden;
        }

        /* Sidebar User List */
        .chat-sidebar {
            width: 320px;
            background: #151c2c;
            border-right: 1px solid rgba(255,255,255,0.05);
            display: flex;
            flex-direction: column;
        }

        .sidebar-header {
            padding: 14px 16px;
            background: #0f172a;
            font-size: 13px;
            font-weight: 800;
            color: #3b82f6;
            text-transform: uppercase;
            border-bottom: 1px solid rgba(255,255,255,0.05);
            letter-spacing: 0.5px;
        }

        .chat-users-list {
            flex: 1;
            overflow-y: auto;
        }

        .user-chat-item {
            padding: 14px 16px;
            border-bottom: 1px solid rgba(255,255,255,0.03);
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: background 0.2s;
        }

        .user-chat-item.active { background: #1e293b; border-left: 4px solid #2563eb; }
        .user-chat-item.unread { background: rgba(37, 99, 235, 0.12); }

        .user-info { display: flex; flex-direction: column; gap: 3px; }
        .user-name { font-size: 13px; font-weight: 700; color: #f8fafc; }
        .user-phone { font-size: 10px; color: #64748b; font-weight: 600; }
        .user-last-msg { font-size: 11px; color: #94a3b8; max-width: 180px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

        .unread-badge {
            background: #ef4444;
            color: #fff;
            font-size: 10px;
            font-weight: 800;
            padding: 2px 7px;
            border-radius: 10px;
        }

        /* Main Chat Window */
        .chat-main-window {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: #090d16;
            position: relative;
        }

        .chat-header {
            padding: 14px 18px;
            background: #0f172a;
            border-bottom: 1px solid rgba(255,255,255,0.05);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .header-user-details { font-size: 14px; font-weight: 700; color: #f8fafc; }
        .mobile-back-btn { display: none; background: none; color: #3b82f6; font-size: 13px; font-weight: 700; cursor: pointer; }

        .chat-messages {
            flex: 1;
            padding: 16px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .msg-bubble {
            max-width: 75%;
            padding: 10px 14px;
            border-radius: 14px;
            font-size: 13.5px;
            line-height: 1.4;
            word-wrap: break-word;
            display: flex;
            flex-direction: column;
        }

        .msg-admin { align-self: flex-end; background: #2563eb; color: #fff; border-bottom-right-radius: 2px; }
        .msg-user { align-self: flex-start; background: #151c2c; color: #f8fafc; border-bottom-left-radius: 2px; border: 1px solid rgba(255,255,255,0.05); }

        .msg-time { font-size: 9.5px; opacity: 0.65; margin-top: 4px; text-align: right; font-family: monospace; }
        
        .msg-image {
            max-width: 100%;
            max-height: 220px;
            border-radius: 8px;
            margin-top: 2px;
            object-fit: cover;
            cursor: pointer;
        }

        .typing-indicator {
            padding: 6px 16px;
            font-size: 11px;
            color: #64748b;
            font-style: italic;
            background: #090d16;
            font-weight: 600;
        }

        /* Input Controls */
        .chat-input-row {
            padding: 12px 16px;
            background: #0f172a;
            display: flex;
            gap: 10px;
            border-top: 1px solid rgba(255,255,255,0.05);
            align-items: center;
        }

        .chat-input-row input[type="text"] {
            flex: 1;
            background: #151c2c;
            padding: 12px 14px;
            border-radius: 10px;
            color: #fff;
            font-size: 13.5px;
            -webkit-user-select: text;
            user-select: text;
        }

        .chat-input-row button {
            background: #2563eb;
            color: #fff;
            padding: 12px 18px;
            border-radius: 10px;
            font-weight: 700;
            font-size: 12px;
            cursor: pointer;
            text-transform: uppercase;
        }

        .media-btn {
            background: #151c2c !important;
            padding: 12px !important;
            border-radius: 10px;
            font-size: 16px;
        }

        /* Image Modal */
        .image-modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(9, 13, 22, 0.95);
            backdrop-filter: blur(4px);
            z-index: 10000;
            justify-content: center;
            align-items: center;
        }
        .image-modal img { max-width: 90%; max-height: 85%; border-radius: 10px; }
        .image-modal-close {
            position: absolute;
            top: 20px;
            right: 20px;
            background: none;
            border: none;
            color: #fff;
            font-size: 24px;
            cursor: pointer;
        }

        @media (max-width: 600px) {
            .chat-sidebar { width: 100%; }
            .chat-main-window { display: none; }
            .chat-main-window.mobile-active { display: flex; position: absolute; width: 100vw; height: 100vh; z-index: 100; }
            .mobile-back-btn { display: block; }
        }
    </style>
</head>
<body>

<div class="chat-sidebar">
    <div class="sidebar-header">💬 GOMAGI Live Conversations</div>
    <div class="chat-users-list" id="userChatList">
        <div style="padding:20px; text-align:center; color:#64748b; font-size:12px;">Loading chat rooms...</div>
    </div>
</div>

<div class="chat-main-window" id="chatMainWindow">
    <div class="chat-header">
        <button class="mobile-back-btn" onclick="closeMobileChat()">← Back</button>
        <div class="header-user-details" id="activeChatHeader">Select a user to start conversation</div>
        <div></div>
    </div>
    
    <div class="chat-messages" id="chatMessages">
        <div style="text-align:center; padding:40px; color:#64748b; font-size:13px;">No conversation selected</div>
    </div>

    <div class="typing-indicator" id="userTypingIndicator" style="display: none;">User is typing...</div>

    <div class="chat-input-row">
        <button class="media-btn" onclick="document.getElementById('adminImageInput').click()">📷</button>
        <input type="file" id="adminImageInput" accept="image/*" style="display:none" onchange="sendAdminImage(this)">
        <input type="text" id="adminReplyInput" placeholder="Type a reply..." onkeypress="if(event.key==='Enter') sendAdminReply()">
        <button onclick="sendAdminReply()">Reply</button>
    </div>
</div>

<div id="imageModal" class="image-modal" onclick="closeImageModal()">
    <span class="image-modal-close">✕</span>
    <img id="modalImage" src="">
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyDLZdlEN9SEb6Z4dsuuMGsRNIzVBMwky_c",
        authDomain: "gogami-877be.firebaseapp.com",
        databaseURL: "https://gogami-877be-default-rtdb.firebaseio.com",
        projectId: "gogami-877be",
        storageBucket: "gogami-877be.firebasestorage.app",
        messagingSenderId: "220921167245",
        appId: "1:220921167245:web:3ccc8b424e5bc927c291c4",
        measurementId: "G-2Q572T3D8J"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();
    const storage = firebase.storage();

    let activeChatId = null;
    let activeUserName = '';
    let messageListener = null;
    let chatMetaListener = null;

    function loadUserChatRooms() {
        db.collection('chats').orderBy('lastUpdated', 'desc').onSnapshot(snapshot => {
            const listContainer = document.getElementById('userChatList');
            if (snapshot.empty) {
                listContainer.innerHTML = '<div style="padding:20px; text-align:center; color:#64748b; font-size:12px;">No active support requests</div>';
                return;
            }

            let html = '';
            snapshot.forEach(doc => {
                const data = doc.data();
                const isUnread = data.unread === true;
                const isSelected = activeChatId === doc.id;

                html += `
                    <div class="user-chat-item ${isSelected ? 'active' : ''} ${isUnread ? 'unread' : ''}" onclick="selectChatRoom('${doc.id}', '${escapeHtml(data.userName || 'User')}')">
                        <div class="user-info">
                            <span class="user-name">👤 ${escapeHtml(data.userName || 'User')}</span>
                            <span class="user-phone">${data.userPhone ? '📞 ' + data.userPhone : ''}</span>
                            <span class="user-last-msg">${escapeHtml(data.lastMessage || 'No message')}</span>
                        </div>
                        ${isUnread ? '<span class="unread-badge">NEW</span>' : ''}
                    </div>`;
            });

            listContainer.innerHTML = html;
        });
    }

    function selectChatRoom(chatId, userName) {
        activeChatId = chatId;
        activeUserName = userName;
        
        document.getElementById('activeChatHeader').innerText = `Chatting with: ${userName}`;
        document.getElementById('chatMainWindow').classList.add('mobile-active');

        // Clear unread flag
        db.collection('chats').doc(chatId).update({ unread: false }).catch(() => {});

        listenChatMetadata(chatId);
        loadMessages(chatId);
    }

    function closeMobileChat() {
        document.getElementById('chatMainWindow').classList.remove('mobile-active');
    }

    function listenChatMetadata(chatId) {
        if (chatMetaListener) chatMetaListener();
        chatMetaListener = db.collection('chats').doc(chatId).onSnapshot(doc => {
            if (doc.exists) {
                document.getElementById('userTypingIndicator').style.display = doc.data().userTyping ? 'block' : 'none';
            }
        });
    }

    function loadMessages(chatId) {
        if (messageListener) messageListener();

        messageListener = db.collection('chats').doc(chatId).collection('messages')
            .orderBy('timestamp', 'asc')
            .onSnapshot(snapshot => {
                const container = document.getElementById('chatMessages');
                if (snapshot.empty) {
                    container.innerHTML = '<div style="text-align:center; padding:30px; color:#64748b; font-size:12px;">No messages in this room</div>';
                    return;
                }

                let html = '';
                snapshot.forEach(doc => {
                    const msg = doc.data();
                    const isAdmin = msg.sender === 'admin' || msg.isUser === false;
                    const time = msg.timestamp?.toDate ? msg.timestamp.toDate().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }) : 'Now';

                    if (msg.type === 'image' || msg.imageUrl) {
                        html += `
                            <div class="msg-bubble ${isAdmin ? 'msg-admin' : 'msg-user'}">
                                <img src="${msg.imageUrl}" class="msg-image" onclick="showImageModal('${msg.imageUrl}')">
                                <div class="msg-time">${time}</div>
                            </div>`;
                    } else {
                        html += `
                            <div class="msg-bubble ${isAdmin ? 'msg-admin' : 'msg-user'}">
                                <div>${escapeHtml(msg.text)}</div>
                                <div class="msg-time">${time}</div>
                            </div>`;
                    }
                });

                container.innerHTML = html;
                container.scrollTop = container.scrollHeight;
            });
    }

    async function sendAdminReply() {
        const input = document.getElementById('adminReplyInput');
        const text = input.value.trim();
        if (!text || !activeChatId) return;

        input.value = '';

        try {
            await db.collection('chats').doc(activeChatId).collection('messages').add({
                sender: 'admin',
                text: text,
                type: 'text',
                isUser: false,
                timestamp: firebase.firestore.FieldValue.serverTimestamp()
            });

            await db.collection('chats').doc(activeChatId).update({
                lastMessage: `Admin: ${text}`,
                lastUpdated: firebase.firestore.FieldValue.serverTimestamp(),
                adminUnread: true
            });

        } catch (e) {
            alert('Failed to send reply: ' + e.message);
        }
    }

    async function sendAdminImage(input) {
        if (!activeChatId) { alert("Please select a user first."); return; }
        const file = input.files[0]; if (!file) return;
        if (!file.type.startsWith('image/')) { alert('Select standard image formats'); return; }

        try {
            const filename = `${Date.now()}_${file.name}`;
            const storageRef = storage.ref(`chat_images/${activeChatId}/${filename}`);
            const snapshot = await storageRef.put(file);
            const imageUrl = await snapshot.ref.getDownloadURL();

            await db.collection('chats').doc(activeChatId).collection('messages').add({
                sender: 'admin',
                imageUrl: imageUrl,
                type: 'image',
                isUser: false,
                timestamp: firebase.firestore.FieldValue.serverTimestamp()
            });

            await db.collection('chats').doc(activeChatId).update({
                lastMessage: '📷 Admin Media Attachment',
                lastUpdated: firebase.firestore.FieldValue.serverTimestamp(),
                adminUnread: true
            });
        } catch (e) { alert("Image upload failed: " + e.message); } 
        finally { input.value = ''; }
    }

    let adminTypingTimeout;
    document.getElementById('adminReplyInput').addEventListener('input', () => {
        if (!activeChatId) return;
        db.collection('chats').doc(activeChatId).update({ adminTyping: true }).catch(() => {});
        clearTimeout(adminTypingTimeout);
        adminTypingTimeout = setTimeout(() => {
            if (activeChatId) db.collection('chats').doc(activeChatId).update({ adminTyping: false }).catch(() => {});
        }, 1000);
    });

    function showImageModal(url) { document.getElementById('modalImage').src = url; document.getElementById('imageModal').style.display = 'flex'; }
    function closeImageModal() { document.getElementById('imageModal').style.display = 'none'; }

    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, m => m === '&' ? '&amp;' : (m === '<' ? '&lt;' : '&gt;'));
    }

    loadUserChatRooms();
</script>
</body>
</html>
