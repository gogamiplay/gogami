<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GOGAMI - Admin Support Chat</title>
    <!-- Supabase JS SDK v2 -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; font-family:'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background:#0f172a; color:#f8fafc; height:100vh; display:flex; }
        .sidebar { width:300px; background:#1e293b; border-right:1px solid #334155; overflow-y:auto; }
        .chat-area { flex:1; display:flex; flex-direction:column; background:#0f172a; }
        .chat-item { padding:15px; border-bottom:1px solid #334155; cursor:pointer; }
        .chat-item:hover, .chat-item.active { background:#334155; }
        .chat-header { padding:15px; background:#1e293b; border-bottom:1px solid #334155; font-weight:bold; }
        .messages { flex:1; padding:20px; overflow-y:auto; display:flex; flex-direction:column; gap:10px; }
        .msg { max-width:60%; padding:10px 14px; border-radius:8px; font-size:14px; }
        .msg.admin { background:#3b82f6; align-self:flex-end; color:#fff; }
        .msg.user { background:#334155; align-self:flex-start; color:#fff; }
        .input-box { padding:15px; background:#1e293b; display:flex; gap:10px; border-top:1px solid #334155; }
        input[type="text"] { flex:1; padding:10px; border-radius:6px; border:1px solid #334155; background:#0f172a; color:#fff; }
        button { padding:10px 20px; background:#3b82f6; border:none; border-radius:6px; color:#fff; font-weight:bold; cursor:pointer; }
    </style>
</head>
<body>

<div class="sidebar" id="chatList">
    <!-- Active customer chat rooms load here -->
</div>

<div class="chat-area">
    <div class="chat-header" id="activeUserTitle">Select a user to chat</div>
    <div class="messages" id="messageList"></div>
    <div class="input-box">
        <input type="text" id="msgInput" placeholder="Type response...">
        <button onclick="sendAdminMessage()">Send</button>
    </div>
</div>

<script>
    const SUPABASE_URL = "https://lcrzohaqjzwjhsyncaim.supabase.co";
    const SUPABASE_ANON_KEY = "sb_publishable_2iAoTgXx8S5XeWy04oiICA_nedHJR_R";
    const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    let currentChatId = null;

    window.onload = () => {
        loadChatRooms();
        listenToRooms();
    };

    async function loadChatRooms() {
        const { data: chats } = await supabaseClient.from('chats').select('*').order('last_message_time', { ascending: false });
        let container = document.getElementById('chatList');
        if(!chats || chats.length === 0) { container.innerHTML = '<div style="padding:15px;">No active support chats</div>'; return; }

        container.innerHTML = chats.map(c => `
            <div class="chat-item ${currentChatId === c.id ? 'active' : ''}" onclick="selectChat('${c.id}', '${c.user_name || c.user_id}')">
                <div style="font-weight:bold;">${c.user_name || 'User: ' + c.user_id.substring(0,8)}</div>
                <div style="font-size:12px; color:#94a3b8;">${c.last_message || 'No messages'}</div>
            </div>
        `).join('');
    }

    async function selectChat(chatId, userName) {
        currentChatId = chatId;
        document.getElementById('activeUserTitle').innerText = `Chatting with: ${userName}`;
        loadMessages();
        listenToMessages();
    }

    async function loadMessages() {
        if(!currentChatId) return;
        const { data: msgs } = await supabaseClient.from('chat_messages').select('*').eq('chat_id', currentChatId).order('timestamp', { ascending: true });
        let container = document.getElementById('messageList');
        if(!msgs) return;

        container.innerHTML = msgs.map(m => `
            <div class="msg ${m.is_admin ? 'admin' : 'user'}">
                ${m.text}
            </div>
        `).join('');
        container.scrollTop = container.scrollHeight;
    }

    async function sendAdminMessage() {
        let txt = document.getElementById('msgInput').value.trim();
        if(!txt || !currentChatId) return;

        document.getElementById('msgInput').value = '';

        // Add to chat messages
        await supabaseClient.from('chat_messages').insert([{
            chat_id: currentChatId,
            sender_id: 'ADMIN',
            text: txt,
            is_admin: true
        }]);

        // Update main chat session
        await supabaseClient.from('chats').update({
            last_message: txt,
            last_message_time: new Date().toISOString()
        }).eq('id', currentChatId);

        loadMessages();
    }

    function listenToRooms() {
        supabaseClient.channel('public:chats')
            .on('postgres_changes', { event: '*', schema: 'public', table: 'chats' }, () => {
                loadChatRooms();
            }).subscribe();
    }

    function listenToMessages() {
        supabaseClient.channel('public:chat_messages')
            .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'chat_messages' }, (payload) => {
                if(payload.new.chat_id === currentChatId) loadMessages();
            }).subscribe();
    }
</script>
</body>
</html>
