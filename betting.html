<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>GOGAMI - Place Bids</title>
    <!-- Supabase JS SDK v2 -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
        body { background: #0f172a; color: #f8fafc; padding-bottom: 90px; min-height: 100vh; }
        .app-container { max-width: 480px; margin: 0 auto; background: #0f172a; min-height: 100vh; padding: 16px; }
        .app-header { display: flex; align-items: center; justify-content: space-between; padding: 4px 0 20px 0; }
        .back-btn { background: none; border: none; color: #94a3b8; font-size: 24px; cursor: pointer; }
        .app-title { font-weight: 800; font-size: 20px; letter-spacing: 2px; color: #3b82f6; }
        .balance-pill { background: #1e293b; border: 1px solid #334155; padding: 6px 14px; border-radius: 20px; color: #10b981; font-weight: 700; font-size: 14px; }
        .card { background: #1e293b; border-radius: 16px; padding: 18px; border: 1px solid #334155; margin-bottom: 16px; }
        .market-title { font-size: 18px; font-weight: 800; color: #38bdf8; text-align: center; margin-bottom: 4px; }
        .game-type-title { font-size: 13px; color: #94a3b8; text-align: center; margin-bottom: 16px; font-weight: 600; }
        .input-group { margin-bottom: 14px; }
        .input-group label { display: block; font-size: 12px; font-weight: 700; color: #94a3b8; margin-bottom: 6px; text-transform: uppercase; }
        .input-field, select.input-field { width: 100%; padding: 12px 14px; background: #0f172a; border: 1px solid #334155; border-radius: 10px; color: #fff; font-size: 14px; font-weight: 600; outline: none; }
        .input-field:focus { border-color: #3b82f6; }
        .btn-add { width: 100%; padding: 12px; background: #334155; border: 1px solid #475569; border-radius: 10px; color: #fff; font-weight: 700; cursor: pointer; text-transform: uppercase; margin-top: 6px; }
        .btn-add:hover { background: #475569; }
        .bids-table { width: 100%; border-collapse: collapse; margin-top: 14px; }
        .bids-table th, .bids-table td { padding: 10px; text-align: left; border-bottom: 1px solid #334155; font-size: 13px; }
        .bids-table th { color: #94a3b8; font-size: 11px; text-transform: uppercase; }
        .btn-submit { width: 100%; padding: 14px; background: #10b981; border: none; border-radius: 10px; color: #fff; font-weight: 800; cursor: pointer; font-size: 15px; text-transform: uppercase; margin-top: 16px; box-shadow: 0 4px 12px rgba(16, 185, 129, 0.2); }
        .btn-submit:disabled { opacity: 0.5; cursor: not-allowed; }
        .remove-btn { background: #ef4444; color: #fff; border: none; padding: 4px 8px; border-radius: 6px; cursor: pointer; font-size: 11px; }
        .message { padding: 12px; border-radius: 8px; text-align: center; margin-top: 14px; font-size: 13px; font-weight: 600; display: none; }
        .message-success { background: rgba(16, 185, 129, 0.1); color: #34d399; border: 1px solid rgba(16, 185, 129, 0.2); }
        .message-error { background: rgba(239, 68, 68, 0.1); color: #f87171; border: 1px solid rgba(239, 68, 68, 0.2); }
    </style>
</head>
<body>
<div class="app-container">
    <div class="app-header">
        <button class="back-btn" onclick="goBack()">←</button>
        <span class="app-title">GOGAMI</span>
        <div class="balance-pill">₹<span id="userBalance">0</span></div>
    </div>

    <div class="card">
        <div class="market-title" id="displayMarketName">Loading Market...</div>
        <div class="game-type-title" id="displayGameType">Single Digit</div>

        <div class="input-group">
            <label>Choose Session</label>
            <select id="sessionSelect" class="input-field">
                <option value="Open">OPEN</option>
                <option value="Close">CLOSE</option>
            </select>
        </div>

        <div class="input-group">
            <label>Enter Number / Digits</label>
            <input type="text" id="bidValueInput" class="input-field" placeholder="e.g. 5">
        </div>

        <div class="input-group">
            <label>Points / Amount (₹)</label>
            <input type="number" id="bidPointsInput" class="input-field" placeholder="Min ₹10">
        </div>

        <button class="btn-add" onclick="addBidToList()">+ Add To Bid Queue</button>
    </div>

    <div class="card" id="queueCard" style="display:none;">
        <h3 style="font-size:14px; color:#94a3b8; margin-bottom:10px; text-transform:uppercase;">Selected Bids Queue</h3>
        <table class="bids-table">
            <thead>
                <tr>
                    <th>Session</th>
                    <th>Number</th>
                    <th>Points</th>
                    <th>Action</th>
                </tr>
            </thead>
            <tbody id="bidsQueueBody"></tbody>
        </table>
        <div style="display:flex; justify-content:space-between; margin-top:14px; font-weight:700; font-size:14px;">
            <span>Total Points:</span>
            <span style="color:#10b981;">₹<span id="totalPointsDisplay">0</span></span>
        </div>
        <button class="btn-submit" id="submitBidsBtn" onclick="submitAllBids()">Confirm & Place Bids</button>
    </div>

    <div id="message" class="message"></div>
</div>

<script>
    const SUPABASE_URL = "https://lcrzohaqjzwjhsyncaim.supabase.co";
    const SUPABASE_ANON_KEY = "sb_publishable_2iAoTgXx8S5XeWy04oiICA_nedHJR_R";
    const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    let currentUser = null;
    let selectedBids = [];
    let marketName = "";
    let gameType = "";

    function getSafeUid() {
        return localStorage.getItem('userUid') || localStorage.getItem('uid');
    }

    window.onload = async () => {
        const urlParams = new URLSearchParams(window.location.search);
        marketName = urlParams.get('market') || 'KALYAN';
        gameType = urlParams.get('game') || 'Single Digit';

        document.getElementById('displayMarketName').innerText = marketName.toUpperCase();
        document.getElementById('displayGameType').innerText = gameType;

        await loadUserData();
    };

    async function loadUserData() {
        let uid = getSafeUid();
        if(!uid) {
            window.location.href = './index.html';
            return;
        }

        const { data: user } = await supabaseClient.from('users').select('*').eq('id', uid).single();
        if(user) {
            currentUser = user;
            document.getElementById('userBalance').innerText = (user.balance || 0).toLocaleString();
        }
    }

    function addBidToList() {
        let session = document.getElementById('sessionSelect').value;
        let value = document.getElementById('bidValueInput').value.trim();
        let points = parseInt(document.getElementById('bidPointsInput').value);

        if(!value) return showMessage('Enter a valid digit/number', 'error');
        if(!points || points < 10) return showMessage('Minimum bid amount is ₹10', 'error');

        selectedBids.push({ session, value, points });
        renderQueue();

        document.getElementById('bidValueInput').value = '';
        document.getElementById('bidPointsInput').value = '';
    }

    function renderQueue() {
        let tbody = document.getElementById('bidsQueueBody');
        let total = 0;
        tbody.innerHTML = '';

        if(selectedBids.length === 0) {
            document.getElementById('queueCard').style.display = 'none';
            return;
        }

        document.getElementById('queueCard').style.display = 'block';

        selectedBids.forEach((b, idx) => {
            total += b.points;
            tbody.innerHTML += `
                <tr>
                    <td>${b.session}</td>
                    <td><strong style="color:#38bdf8;">${b.value}</strong></td>
                    <td>₹${b.points}</td>
                    <td><button class="remove-btn" onclick="removeBid(${idx})">✕</button></td>
                </tr>
            `;
        });

        document.getElementById('totalPointsDisplay').innerText = total.toLocaleString();
    }

    function removeBid(index) {
        selectedBids.splice(index, 1);
        renderQueue();
    }

    async function submitAllBids() {
        if(selectedBids.length === 0) return;
        let totalPoints = selectedBids.reduce((acc, b) => acc + b.points, 0);

        if(totalPoints > (currentUser?.balance || 0)) {
            return showMessage(`Insufficient balance! You need ₹${totalPoints}`, 'error');
        }

        let btn = document.getElementById('submitBidsBtn');
        btn.disabled = true;
        btn.innerText = 'Processing Bids...';

        try {
            // 1. Deduct Balance
            let newBalance = currentUser.balance - totalPoints;
            await supabaseClient.from('users').update({ balance: newBalance }).eq('id', currentUser.id);

            // 2. Prepare Bids Data
            let insertPayload = selectedBids.map(b => ({
                user_id: currentUser.id,
                market: marketName,
                game_type: gameType,
                bid_type: b.session,
                value: b.value,
                points: b.points,
                status: 'pending'
            }));

            // 3. Batch Insert
            const { error } = await supabaseClient.from('bids').insert(insertPayload);

            if(!error) {
                showMessage('🎉 Bids Placed Successfully!', 'success');
                selectedBids = [];
                renderQueue();
                await loadUserData();
            } else {
                // Rollback Balance if failed
                await supabaseClient.from('users').update({ balance: currentUser.balance }).eq('id', currentUser.id);
                showMessage('Error placing bids: ' + error.message, 'error');
            }
        } catch(e) {
            showMessage('Transaction Error: ' + e.message, 'error');
        } finally {
            btn.disabled = false;
            btn.innerText = 'Confirm & Place Bids';
        }
    }

    function showMessage(msg, type) {
        let d = document.getElementById('message');
        d.innerText = msg;
        d.className = `message message-${type}`;
        d.style.display = 'block';
        setTimeout(() => d.style.display = 'none', 4000);
    }

    function goBack() { window.location.href = './index.html'; }
</script>
</body>
</html>
