            margin: 0; 
            padding: 0; 
            box-sizing: border-box; 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;

            -webkit-user-select: none;
            user-select: none;
            outline: none;
            border: none;
        }

        /* Full Screen Android App Style Splash Screen */
        #splashScreen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: #090d16;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            transition: opacity 0.3s ease, visibility 0.3s ease;
        }

        .splash-logo {
            width: 150px;
            height: 150px;
            object-fit: contain;
            margin-bottom: 30px;
        }

        .loader-bar {
            width: 120px;
            height: 3px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            overflow: hidden;
            position: relative;
        }

        .loader-bar::after {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: #2563eb;
            border-radius: 10px;
            animation: loading 1.2s infinite linear;
        }

        @keyframes loading {
            0% { left: -100%; }
            50% { left: 0%; }
            100% { left: 100%; }
        }

        /* Top Panel Header */
        .sticky-top-panel {
            position: fixed; 
            top: 0; 
            left: 0; 
            right: 0; 
            max-width: 480px; 
            margin: 0 auto; 
            height: 56px;
            background: #0f172a; 
            color: #fff; 
            z-index: 1000;

        .top-panel-back-arrow {

            border: none; 
            color: #fff;

            align-items: center; 
        }

        .market-header-info {

            margin-left: 16px; 
            display: flex; 
            align-items: center; 
            justify-content: space-between; 
        }

        .market-meta-title { 
            font-size: 15px; 
            font-weight: 700; 
            color: #ffffff; 
            text-transform: uppercase; 
            letter-spacing: 0.5px; 
        }

        .balance-box-display { 
            font-size: 14px; 
            font-weight: 700; 
            color: #10b981; 
            display: flex; 
            align-items: center; 
            gap: 6px; 
            background: #151c2c;
            padding: 6px 12px;
            border-radius: 10px;

            display: flex; 
            align-items: center; 
            padding: 10px 16px; 
            background: #090d16; 
            margin-top: 56px; 
            flex-shrink: 0; 
        }

            background: none; 
            border: none; 
            color: #3b82f6; 
            font-size: 13px; 
            font-weight: 800;

            text-align: center; 
            cursor: pointer; 
            display: flex;

            align-items: center; 
            justify-content: center;

            background: transparent;

            outline: none; 
            font-size: 14.5px; 
            font-weight: 600; 
            color: #fff;

            color: #fff; 
            border: none; 
            padding: 12px 36px; 
            border-radius: 12px; 
            font-size: 14px; 
            font-weight: 700; 
            cursor: pointer; 
            margin-top: 2px;

        .meta-col-label { font-size: 12px; font-weight: 700; color: #3b82f6; flex: 1; text-align: center; text-transform: uppercase; }
        .meta-col-label:first-child { text-align: left; padding-left: 8px; }
        .meta-col-label:last-child { text-align: right; padding-right: 24px; }

            overflow-y: auto !important; 
            background: #090d16; 
            width: 100%; 
            display: block;

        .bids-section { display: flex; flex-direction: column; padding-bottom: 20px; }

            position: fixed; 
            bottom: 0; 
            left: 0; 
            right: 0;

            margin: 0 auto;

        .submit-btn { 
            background: #2563eb; 
            color: #fff; 
            border: none; 
            padding: 12px 36px; 
            border-radius: 12px; 
            font-size: 14px; 
            font-weight: 700;

        .error { background: rgba(239, 68, 68, 0.15); color: #f87171; }
        .success { background: rgba(16, 185, 129, 0.15); color: #34d399; }
    </style>
</head>

    async function syncServerOffset() {
        try {
            const docRef = db.collection('settings').doc('servertime');
            await docRef.set({ timestamp: firebase.firestore.FieldValue.serverTimestamp() });
            const doc = await docRef.get();
            if (doc.exists && doc.data().timestamp) {
                const sTime = doc.data().timestamp.toDate().getTime();
                serverTimeOffset = sTime - Date.now();
            }
        } catch(e) {
            serverTimeOffset = 0;
        }
    }

    function isBettingAllowedFast() {
        if (currentStatus === 'holiday') return { allowed: false, message: '⚠️ Market Closed due to holiday.' };
        
        const nowServer = new Date(Date.now() + serverTimeOffset);
        const curMin = nowServer.getHours() * 60 + nowServer.getMinutes();
        
        let evaluatedTimeLimit = marketOpenEndTime;
        if (currentStatus === 'close') {
            evaluatedTimeLimit = marketCloseEndTime;
        } else if (currentGameType && ['Single Digit', 'Single Pana', 'Double Pana', 'Triple Pana', 'Family Pana'].includes(currentGameType)) {
            evaluatedTimeLimit = (selectedOpenClose === 'Open') ? marketOpenEndTime : marketCloseEndTime;
        }

        if (evaluatedTimeLimit && curMin >= evaluatedTimeLimit) {
            return { allowed: false, message: '⚠️ Time over for bidding! Market has been closed.' };
        }
        return { allowed: true };
    }

    function timeToMinutes(t) { if (!t) return null; const p = t.split(':'); return parseInt(p[0]) * 60 + parseInt(p[1]); }

                <span class="card-shape-icon ${g.color}">${g.shape}</span>
                <div class="game-card-name">${g.name}</div>
            </div>
        `).join('');
    }

        const check = isBettingAllowedFast(); 
        if (!check.allowed) { alert(check.message); return; }

        let targetType = (['Single Digit', 'Single Pana', 'Double Pana', 'Triple Pana', 'Family Pana'].includes(resolvedGameType)) ? ((currentStatus === 'close') ? 'Close' : selectedOpenClose) : 'Close';

        const exists = bids.some(b => b.type === resolvedGameType && b.value === val && b.bidType === targetType);

            bids.push({ type: resolvedGameType, gameType: resolvedGameType, bidType: targetType, value: val, points: pts, market: currentMarket, marketId: currentMarketId });

        updateSummary(); 
        const targetBlock = document.getElementById('bidsContainerTargetBlock');
        if(targetBlock) targetBlock.innerHTML = renderBidsOnly();

        if (val.length === 2) {
            const ptsInput = document.getElementById('pointsInput');
            const pts = parseInt(ptsInput.value);
            if (isNaN(pts) || pts < 5) {
                alert('Min ₹5 required. Please enter points above.');
                el.value = '';
                return;
            }
            addToBidsDirectly('Jodi', val, pts);
            el.value = ''; // Auto clear Jodi digit input for fast continuous entry
        }
    }

    // Super Fast Family and Manual Add Execution
    function handleAutoAddManualButton() {
        let v1El = document.getElementById('v1'); if(!v1El) return;
        const val = v1El.value.trim();
        const pts = parseInt(document.getElementById('pointsInput').value);
        if(isNaN(pts) || pts < 5) { alert('Min ₹5 required'); return; }
        if(!val) { alert('Please enter a valid number'); return; }

        if((currentGameType === 'Family Jodi' || currentGameType === 'Family Red Jodi') && val.length === 2) {
            let matchedFamily = familyJodiGroups.find(arr => arr.includes(val));
            if(matchedFamily) {
                matchedFamily.forEach(num => addToBidsDirectly('Jodi', num, pts));
                showMsg("✨ Family Jodi Group Added", false); v1El.value = ''; return;
            }
            let matchedRed = redJodiGroups.find(arr => arr.includes(val));
            if(matchedRed) {
                matchedRed.forEach(num => addToBidsDirectly('Jodi', num, pts));
                showMsg("✨ Red Family Group Added", false); v1El.value = ''; return;
            }
            addToBidsDirectly('Jodi', val, pts); v1El.value = '';
        } 
        else if(currentGameType === 'Family Pana' && val.length === 3) {
            let matchedPanaGroup = familyPanaGroups.find(arr => arr.includes(val));
            if(matchedPanaGroup) {
                matchedPanaGroup.forEach(num => {
                    let exactPanaType = detectExplicitPanaType(num);
                    addToBidsDirectly(exactPanaType, num, pts);
                });
                showMsg("✨ Pana Family Group Added", false); v1El.value = ''; return;
            }
            let exactPanaType = detectExplicitPanaType(val);
            addToBidsDirectly(exactPanaType, val, pts); v1El.value = '';
        }
        else if(['Single Pana', 'Double Pana', 'Triple Pana'].includes(currentGameType) && val.length === 3) {
            if(currentGameType==='Single Pana' && !validSinglePanaList.includes(val)){ alert('Invalid Single Pana'); return; }
            if(currentGameType==='Double Pana' && !validDoublePanaList.includes(val)){ alert('Invalid Double Pana'); return; }
            if(currentGameType==='Triple Pana' && !validTriplePanaList.includes(val)){ alert('Invalid Triple Pana'); return; }
            addToBidsDirectly(currentGameType, val, pts); v1El.value = '';
        } else {
            addToBidsDirectly(currentGameType, val, pts); v1El.value = '';
        }
    }

    function updateSummary() {
        document.getElementById('totalBids').innerText = bids.length;
        document.getElementById('totalPoints').innerText = bids.reduce((s,b)=>s+b.points,0);
    }

    function removeBid(i) { 
        bids.splice(i,1); 
        updateSummary(); 
        const targetBlock = document.getElementById('bidsContainerTargetBlock');
        if(targetBlock) targetBlock.innerHTML = renderBidsOnly();
    }

    async function submitBids() {
        if (isSubmitting || bids.length === 0) return;
        
        const check = isBettingAllowedFast(); 
        if (!check.allowed) { 
            showMsg(check.message, true); 
            alert(check.message); 
            bids = []; 
            updateSummary(); 
            showGameSelection(); 
            return; 
        }
        
        const total = bids.reduce((s,b)=>s+b.points,0);
        const userDoc = await db.collection('users').doc(auth.currentUser.uid).get();
        const bal = userDoc.data().balance || 0;
        if (bal < total) { showMsg('Insufficient balance', true); return; }

        isSubmitting = true;
        const btn = document.getElementById('submitBtn'); btn.disabled = true; btn.innerText = 'Submitting...';
        try {
            const batch = db.batch();
            batch.update(db.collection('users').doc(auth.currentUser.uid), { balance: bal - total });
            const ts = firebase.firestore.FieldValue.serverTimestamp();
            bids.forEach(b => batch.set(db.collection('bids').doc(), { ...b, userId: auth.currentUser.uid, status: 'pending', createdAt: ts }));
            await batch.commit();
            document.getElementById('userBalance').innerText = (bal - total).toFixed(2);
            showMsg('✅ Bids Placed Successfully!', false); bids = []; updateSummary(); renderPanel();
        } catch(e) { showMsg('Error placing bids. Try again.', true); }
        finally { isSubmitting = false; btn.disabled = false; btn.innerText = 'Submit'; }
    }

    function checkPanaLegality(p) {
        return validSinglePanaList.includes(p) || validDoublePanaList.includes(p) || validTriplePanaList.includes(p);
    }

    function addSangamPlacements() {
        let v1 = document.getElementById('v1').value.trim();
        let v2 = document.getElementById('v2').value.trim();
        let pts = parseInt(document.getElementById('pointsInput').value);
        
        if(isNaN(pts) || pts < 5) { alert('Min ₹5 required'); return; }
        if(!v1 || !v2) { alert('Please enter both values'); return; }

        if(currentGameType === 'Half Sangam A') {
            if(!checkPanaLegality(v1)) { alert('Invalid Open Pana value'); return; }
            if(!/^\d$/.test(v2)) { alert('Close digit must be 1-Digit'); return; }
        } else if(currentGameType === 'Half Sangam B') {
            if(!/^\d$/.test(v1)) { alert('Open digit must be 1-Digit'); return; }
            if(!checkPanaLegality(v2)) { alert('Invalid Close Pana value'); return; }
        } else if(currentGameType === 'Full Sangam') {
            if(!checkPanaLegality(v1)) { alert('Invalid Open Pana value'); return; }
            if(!checkPanaLegality(v2)) { alert('Invalid Close Pana value'); return; }
        }

        addToBidsDirectly(currentGameType, `${v1}-${v2}`, pts);
    }

    function renderPanel() {
        const p = document.getElementById('gamePanel');
        const pts = document.getElementById('pointsInput')?.value || '';
        
        let hasOpenClosePill = ['Single Digit', 'Single Pana', 'Double Pana', 'Triple Pana', 'Family Pana'].includes(currentGameType);
        
        let dropdownSelectionHeader = `
            ${hasOpenClosePill && currentStatus === 'open' ? `
            <div class="native-image-row">
                <span class="native-image-label">Select Session</span>
                <div class="select-native-dropdown-wrapper">
                    <select class="select-native-input" onchange="selectedOpenClose=this.value;">
                        <option value="Open" ${selectedOpenClose==='Open'?'selected':''}>${currentMarket} OPEN</option>
                        <option value="Close" ${selectedOpenClose==='Close'?'selected':''}>${currentMarket} CLOSE</option>
                    </select>
                </div>
            </div>` : ''}`;

        let labelStringText = currentGameType;

        if (currentGameType === 'Single Digit') {
            let grid = ''; 
            for(let i=0;i<=9;i++) grid += `<div class="digit-btn" onclick="addToBidsDirectly('Single Digit', '${i}', parseInt(document.getElementById('pointsInput').value))">${i}</div>`;
            p.innerHTML = `
                <div class="game-panel-content">
                    ${dropdownSelectionHeader}
                    <div class="native-image-row"><span class="native-image-label">Enter Points</span><div class="native-input-box-wrapper"><input type="number" id="pointsInput" class="native-form-input-field" value="${pts||''}" placeholder="Enter Points"></div></div>
                    <div class="digit-grid">${grid}</div>
                </div>
                ${renderTableWrapper()}`;
        } else if (currentGameType === 'Jodi') {
            p.innerHTML = `
                <div class="game-panel-content">
                    ${dropdownSelectionHeader}
                    <div class="native-image-row"><span class="native-image-label">Enter Points</span><div class="native-input-box-wrapper"><input type="number" id="pointsInput" class="native-form-input-field" value="${pts||''}" placeholder="Enter Points"></div></div>
                    <div class="native-image-row"><span class="native-image-label">Enter Jodi Digit</span><div class="native-input-box-wrapper"><input type="tel" id="jodiDigitInput" class="native-form-input-field" maxlength="2" inputmode="numeric" placeholder="Enter Jodi (00-99)" oninput="handleJodiInput(this)"></div></div>
                </div>
                ${renderTableWrapper()}`;
        } else if (currentGameType.includes('Sangam')) {
            let labels = currentGameType === 'Half Sangam A' ? ['Open Pana', 'Close Digit'] : (currentGameType === 'Half Sangam B' ? ['Open Digit', 'Close Pana'] : ['Open Pana', 'Close Pana']);
            p.innerHTML = `
                <div class="game-panel-content">
                    ${dropdownSelectionHeader}
                    <div class="native-image-row"><span class="native-image-label">${labels[0]}</span><div class="native-input-box-wrapper"><input type="number" id="v1" class="native-form-input-field" placeholder="${labels[0]}"></div></div>
                    <div class="native-image-row"><span class="native-image-label">${labels[1]}</span><div class="native-input-box-wrapper"><input type="number" id="v2" class="native-form-input-field" placeholder="${labels[1]}"></div></div>
                    <div class="native-image-row"><span class="native-image-label">Enter Points</span><div class="native-input-box-wrapper"><input type="number" id="pointsInput" class="native-form-input-field" value="${pts||''}" placeholder="Enter Points"></div></div>
                    <button class="native-add-more-btn" onclick="addSangamPlacements()">Add More</button>
                </div>
                ${renderTableWrapper()}`;
        } else {
            p.innerHTML = `
                <div class="game-panel-content">
                    ${dropdownSelectionHeader}
                    <div class="native-image-row"><span class="native-image-label">${labelStringText}</span><div class="native-input-box-wrapper"><input type="number" id="v1" class="native-form-input-field" placeholder="${labelStringText}"></div></div>
                    <div class="native-image-row"><span class="native-image-label">Enter Points</span><div class="native-input-box-wrapper"><input type="number" id="pointsInput" class="native-form-input-field" value="${pts||''}" placeholder="Enter Points"></div></div>
                    <button class="native-add-more-btn" onclick="handleAutoAddManualButton()">Add More</button>
                </div>
                ${renderTableWrapper()}`;
        }
    }

    function renderTableWrapper() {
        return `
            <div class="table-metadata-header-row">
                <span class="meta-col-label" style="text-align: left;">${currentGameType}</span>
                <span class="meta-col-label" style="text-align: center;">Points</span>
                <span class="meta-col-label" style="text-align: right;">Type</span>
            </div>
            <div class="isolated-scroll-bids-window">
                <div id="bidsContainerTargetBlock" class="bids-section">${renderBidsOnly()}</div>
            </div>`;
    }

    function renderBidsOnly() { 
        return bids.length ? bids.map((b,i)=>`
            <div class="bid-item">
                <div class="bid-info">
                    <span class="bid-value">${b.value}</span>
                    <span class="bid-points">${b.points}</span>
                    <span class="bid-resolved-type-label">${b.type}</span>
                </div>
                <button class="remove-bid" onclick="removeBid(${i})">✕</button>
            </div>`).join('') : ''; 
    }
    
    function showMsg(m, e) { 
        const d = document.getElementById('message'); 
        d.innerText = m; 
        d.className = `message ${e?'error':'success'}`; 
        d.classList.remove('hidden'); 
        setTimeout(()=>d.classList.add('hidden'), 2000); 
    }
    
    function goBack() { window.location.href = 'dashboard.html'; }

    const url = new URLSearchParams(window.location.search);
    currentMarket = decodeURIComponent(url.get('market') || 'Market');
    currentMarketId = url.get('marketId') || '';
    currentStatus = url.get('status') || 'open';
    document.getElementById('marketName').innerText = currentMarket;

    db.collection('markets').doc(currentMarketId).get().then(d => {
        if(d.exists) {
            marketOpenEndTime = timeToMinutes(d.data().openBidEnd);
            marketCloseEndTime = timeToMinutes(d.data().closeBidEnd);
            renderGameTypeSelection();
            hideSplashScreen();
        } else {
            hideSplashScreen();
        }
    }).catch(() => hideSplashScreen());

    auth.onAuthStateChanged(user => { 
        if(!user) {
            location.href='index.html'; 
        } else { 
            syncServerOffset();
            db.collection('users').doc(user.uid).get().then(d => { 
                document.getElementById('userBalance').innerText = (d.data().balance || 0).toFixed(2); 
            }); 
        } 
    });

    setTimeout(hideSplashScreen, 2500);
</script>
</body>
</html>
