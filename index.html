<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Official App</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <style>
        * { 
            margin: 0; 
            padding: 0; 
            box-sizing: border-box; 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; 
            -webkit-tap-highlight-color: transparent;
            border: none;
            outline: none;
        }

        body {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #090d16;
            overflow: hidden;
            position: relative;
        }

        /* Subtle Animated Background Glowing Orbs */
        .bg-glow-1, .bg-glow-2 {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            pointer-events: none;
            z-index: 1;
        }

        .bg-glow-1 {
            width: 250px;
            height: 250px;
            background: rgba(37, 99, 235, 0.18);
            top: 15%;
            left: 50%;
            transform: translateX(-50%);
            animation: floatGlow 6s ease-in-out infinite alternate;
        }

        .bg-glow-2 {
            width: 200px;
            height: 200px;
            background: rgba(58, 134, 255, 0.12);
            bottom: 20%;
            left: 50%;
            transform: translateX(-50%);
            animation: floatGlow 8s ease-in-out infinite alternate-reverse;
        }

        @keyframes floatGlow {
            0% { transform: translate(-50%, 0); }
            100% { transform: translate(-50%, 25px); }
        }

        /* Full Screen Android App Style Splash Screen */
        #splashScreen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: #090d16;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            transition: opacity 0.4s ease, visibility 0.4s ease;
        }

        .splash-logo {
            width: 170px;
            height: 170px;
            object-fit: contain;
            filter: drop-shadow(0 0 25px rgba(58, 134, 255, 0.3));
            margin-bottom: 25px;
            animation: pulseLogo 2s infinite ease-in-out;
        }

        .loader-bar {
            width: 130px;
            height: 3px;
            background: rgba(255, 255, 255, 0.08);
            border-radius: 10px;
            overflow: hidden;
            position: relative;
        }

        .loader-bar::after {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: #3a86ff;
            border-radius: 10px;
            animation: loading 1.2s infinite linear;
        }

        @keyframes loading {
            0% { left: -100%; }
            50% { left: 0%; }
            100% { left: 100%; }
        }

        @keyframes pulseLogo {
            0%, 100% { transform: scale(1); opacity: 0.95; }
            50% { transform: scale(1.05); opacity: 1; }
        }

        /* Direct Full Page Layout (No Cards / No Borders) */
        .app-wrapper {
            width: 100%;
            max-width: 360px;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            position: relative;
            z-index: 2;
            animation: fadeInUp 0.6s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .main-logo {
            width: 160px;
            height: 160px;
            object-fit: contain;
            filter: drop-shadow(0 10px 25px rgba(0, 0, 0, 0.4));
            margin-bottom: 35px;
            animation: floatLogo 4s ease-in-out infinite;
        }

        @keyframes floatLogo {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-8px); }
        }

        .screen { 
            width: 100%; 
            display: flex; 
            flex-direction: column; 
            animation: fadeIn 0.3s ease-in-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .hidden { 
            display: none !important; 
        }

        /* Seamless Borderless Input Fields */
        .input-field {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 16px;
            padding: 18px 20px;
            width: 100%;
            color: #ffffff;
            font-size: 16px;
            margin-bottom: 18px;
            text-align: center;
            font-weight: 600;
            letter-spacing: 0.8px;
            transition: background 0.25s ease, transform 0.2s ease;
        }

        .input-field:focus {
            background: rgba(255, 255, 255, 0.09);
            transform: scale(1.01);
        }

        .input-field::placeholder { 
            color: #64748b; 
            font-weight: 400;
            letter-spacing: 0px;
        }

        /* Clean High-Speed Action Buttons */
        .btn {
            width: 100%;
            padding: 18px;
            background: linear-gradient(135deg, #2563eb 0%, #1d4ed8 100%);
            border-radius: 16px;
            color: #ffffff;
            font-weight: 700;
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 1px;
            cursor: pointer;
            box-shadow: 0 10px 25px -5px rgba(37, 99, 235, 0.4);
            transition: transform 0.15s ease, opacity 0.2s ease;
        }

        .btn:active { 
            transform: scale(0.97); 
            opacity: 0.9;
        }

        .btn:disabled {
            background: rgba(255, 255, 255, 0.08);
            color: #475569;
            cursor: not-allowed;
            box-shadow: none;
        }

        .welcome-text { 
            color: #94a3b8; 
            font-size: 14px; 
            margin-bottom: 16px; 
            text-align: center; 
            font-weight: 500; 
        }

        .timer { 
            color: #fbbf24; 
            font-size: 13px; 
            font-weight: 700; 
            margin-bottom: 16px; 
            text-align: center; 
            font-family: monospace; 
            letter-spacing: 0.5px;
        }

        .error-text { 
            color: #f87171; 
            font-size: 12px; 
            text-align: center; 
            margin-top: 12px; 
            font-weight: 600; 
            min-height: 16px;
        }
    </style>
</head>
<body>

    <!-- Background Glow Animations -->
    <div class="bg-glow-1"></div>
    <div class="bg-glow-2"></div>

    <!-- Android App Style Splash Screen -->
    <div id="splashScreen">
        <img src="https://i.imgur.com/Leuze73.png" alt="Logo" class="splash-logo">
        <div class="loader-bar"></div>
    </div>

    <!-- Direct Full Page Content Area (No Bordered Container) -->
    <div class="app-wrapper">
        <img src="https://i.imgur.com/Leuze73.png" alt="Logo" class="main-logo">
        
        <!-- Phone Number Input Screen -->
        <div id="phoneScreen" class="screen">
            <input type="tel" id="phoneNumber" class="input-field" placeholder="Enter Mobile Number" maxlength="10" inputmode="numeric" oninput="this.value = this.value.replace(/\D/g,'')">
            <button class="btn" id="sendOtpBtn">Login with OTP</button>
            <div id="phoneError" class="error-text"></div>
        </div>

        <!-- OTP Verification Screen -->
        <div id="otpScreen" class="screen hidden">
            <div class="welcome-text">Enter 6-digit OTP sent to your phone</div>
            <div class="timer" id="timer">Seconds Remaining: 60</div>
            <input type="text" id="otpCode" class="input-field" placeholder="Enter OTP" maxlength="6" inputmode="numeric" autocomplete="one-time-code" oninput="this.value = this.value.replace(/\D/g,'')">
            <button class="btn" id="verifyOtpBtn">VERIFY OTP</button>
            <div id="otpError" class="error-text"></div>
        </div>

        <!-- Profile Setup Screen -->
        <div id="registerScreen" class="screen hidden">
            <div class="welcome-text">Complete Your Profile</div>
            <input type="text" id="regName" class="input-field" placeholder="Full Name">
            <button class="btn" id="registerBtn">Create Account & Login</button>
            <div id="regError" class="error-text"></div>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyDLZdlEN9SEb6Z4dsuuMGsRNIzVBMwky_c",
            authDomain: "gogami-877be.firebaseapp.com",
            databaseURL: "https://gogami-877be-default-rtdb.firebaseio.com",
            projectId: "gogami-877be",
            storageBucket: "gogami-877be.firebasestorage.app",
            messagingSenderId: "220921167245",
            appId: "1:220921167245:web:3ccc8b424e5bc927c291c4",
            measurementId: "G-2Q572T3D8J"
        };
        
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();
        auth.setPersistence(firebase.auth.Auth.Persistence.LOCAL);

        let ac = null;

        function hideSplashScreen() {
            const splash = document.getElementById('splashScreen');
            if (splash && splash.style.opacity !== '0') {
                splash.style.opacity = '0';
                setTimeout(() => {
                    splash.style.visibility = 'hidden';
                }, 400);
            }
        }
        
        let confirmationResult = null, currentPhone = null, countdown = 0, timerInterval = null, recaptchaVerifier = null;
        
        function showScreen(screen) {
            document.getElementById('phoneScreen').className = 'screen hidden';
            document.getElementById('otpScreen').className = 'screen hidden';
            document.getElementById('registerScreen').className = 'screen hidden';
            screen.className = 'screen';
        }
        
        function showError(elementId, message) { 
            const el = document.getElementById(elementId); 
            if (el) { 
                el.innerText = message; 
                setTimeout(() => el.innerText = '', 4000); 
            } 
        }
        
        function initRecaptcha() { 
            if (!recaptchaVerifier) { 
                const container = document.createElement('div'); 
                container.id = 'recaptcha-container'; 
                container.style.position = 'absolute'; 
                container.style.left = '-9999px'; 
                document.body.appendChild(container); 
                recaptchaVerifier = new firebase.auth.RecaptchaVerifier('recaptcha-container', { size: 'invisible' }); 
            } 
            return recaptchaVerifier; 
        }
        
        function startTimer(seconds, timerElementId) { 
            countdown = seconds; 
            if (timerInterval) clearInterval(timerInterval); 
            timerInterval = setInterval(() => { 
                if (countdown <= 1) clearInterval(timerInterval); 
                const timerEl = document.getElementById(timerElementId); 
                if (timerEl && countdown > 0) timerEl.innerText = `Seconds Remaining: ${countdown}`; 
                countdown--; 
            }, 1000); 
        }

        // WebOTP Listener for Automatic Read & Fill
        function listenForAutoOTP() {
            if ('OTPCredential' in window) {
                ac = new AbortController();
                navigator.credentials.get({
                    otp: { transport: ['sms'] },
                    signal: ac.signal
                }).then(otp => {
                    if (otp && otp.code) {
                        const otpInput = document.getElementById('otpCode');
                        otpInput.value = otp.code;
                        document.getElementById('verifyOtpBtn').click();
                    }
                }).catch(err => {
                    console.log('WebOTP Error/Cancelled:', err);
                });
            }
        }
        
        document.getElementById('sendOtpBtn').onclick = function() {
            const phone = document.getElementById('phoneNumber').value.replace(/\D/g, '');
            if (!phone || phone.length !== 10) { 
                showError('phoneError', 'Enter a valid 10-digit mobile number'); 
                return; 
            }
            
            this.disabled = true;
            this.innerText = 'Sending OTP...';
            
            currentPhone = '+91' + phone;
            sendVerificationPhone(currentPhone, this, 'phoneError');
        };

        function sendVerificationPhone(phoneNumber, btnElement, errorId) {
            const verifier = initRecaptcha();
            auth.signInWithPhoneNumber(phoneNumber, verifier).then(confirmation => { 
                confirmationResult = confirmation; 
                showScreen(document.getElementById('otpScreen')); 
                startTimer(60, 'timer'); 
                btnElement.disabled = false; 
                btnElement.innerText = 'Login with OTP'; 
                
                listenForAutoOTP();
            }).catch(error => { 
                showError(errorId, error.message || 'Failed to send OTP. Try again.'); 
                btnElement.disabled = false; 
                btnElement.innerText = 'Login with OTP'; 
            });
        }
        
        document.getElementById('verifyOtpBtn').onclick = function() {
            const code = document.getElementById('otpCode').value;
            if (!code || code.length !== 6) { 
                showError('otpError', 'Enter 6-digit OTP'); 
                return; 
            }
            const btn = this; 
            btn.disabled = true; 
            btn.innerText = 'Verifying...';

            if (ac) ac.abort();
            
            confirmationResult.confirm(code).then(result => { 
                const user = result.user; 
                db.collection('users').doc(user.uid).get().then(doc => { 
                    if (doc.exists) {
                        window.location.href = 'dashboard.html';
                    } else {
                        showScreen(document.getElementById('registerScreen'));
                        btn.disabled = false; 
                        btn.innerText = 'VERIFY OTP';
                    }
                }).catch(() => { 
                    showScreen(document.getElementById('registerScreen')); 
                    btn.disabled = false; 
                }); 
            }).catch(() => { 
                showError('otpError', 'Invalid OTP. Please check and try again.'); 
                btn.disabled = false; 
                btn.innerText = 'VERIFY OTP';
            });
        };
        
        document.getElementById('registerBtn').onclick = function() {
            const name = document.getElementById('regName').value.trim();
            if (!name) { 
                showError('regError', 'Enter your name'); 
                return; 
            } 
            
            const user = auth.currentUser; 
            if (!user) { 
                showError('regError', 'Session expired. Try again.'); 
                return; 
            }
            const btn = this; 
            btn.disabled = true; 
            btn.innerText = 'Creating Account...';
            
            db.collection('users').doc(user.uid).set({ 
                uid: user.uid, 
                phone: user.phoneNumber, 
                name: name, 
                balance: 0, 
                role: 'user', 
                createdAt: new Date() 
            }).then(() => { 
                window.location.href = 'dashboard.html'; 
            }).catch(error => { 
                showError('regError', error.message); 
                btn.disabled = false; 
                btn.innerText = 'Create Account & Login'; 
            });
        };

        // Automatic Backend Check on Load
        auth.onAuthStateChanged(user => { 
            if (user) { 
                db.collection('users').doc(user.uid).get().then(doc => { 
                    if (doc.exists) { 
                        window.location.href = 'dashboard.html'; 
                    } else { 
                        showScreen(document.getElementById('registerScreen')); 
                        hideSplashScreen();
                    } 
                }).catch(() => {
                    showScreen(document.getElementById('phoneScreen'));
                    hideSplashScreen();
                }); 
            } else { 
                showScreen(document.getElementById('phoneScreen')); 
                hideSplashScreen();
            } 
        });

        setTimeout(hideSplashScreen, 2500);
    </script>
</body>
</html>
