<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>GOGAMI - Official</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <style>
        * { 
            margin: 0; 
            padding: 0; 
            box-sizing: border-box; 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; 
            -webkit-tap-highlight-color: transparent;
        }

        body {
            height: 100vh;
            width: 100vw;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #e0e8f5;
            overflow: hidden;
        }

        /* App-like Splash / Loading Screen */
        #splashScreen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #1e40af 0%, #1e3a8a 100%);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            transition: opacity 0.5s ease, visibility 0.5s ease;
        }

        .splash-logo {
            width: 130px;
            height: auto;
            animation: logoPulse 1.8s infinite ease-in-out;
            filter: drop-shadow(0 10px 20px rgba(0, 0, 0, 0.3));
        }

        @keyframes logoPulse {
            0% { transform: scale(0.95); opacity: 0.8; }
            50% { transform: scale(1.05); opacity: 1; }
            100% { transform: scale(0.95); opacity: 0.8; }
        }

        .spinner {
            margin-top: 25px;
            width: 32px;
            height: 32px;
            border: 3.5px solid rgba(255, 255, 255, 0.2);
            border-top: 3.5px solid #ffffff;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* Mobile View App Container */
        .app-container {
            width: 100%;
            max-width: 420px;
            height: 100vh;
            background: #ffffff;
            display: flex;
            flex-direction: column;
            position: relative;
            box-shadow: 0 15px 35px rgba(30, 58, 138, 0.15);
            overflow: hidden;
        }

        /* Top Header Area with Blue Accent */
        .top-header {
            background: linear-gradient(135deg, #2563eb 0%, #1d4ed8 100%);
            padding: 40px 20px 30px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            border-bottom-left-radius: 28px;
            border-bottom-right-radius: 28px;
            box-shadow: 0 8px 20px rgba(37, 99, 235, 0.25);
        }

        .brand-logo {
            width: 110px;
            height: auto;
            margin-bottom: 8px;
            filter: drop-shadow(0 4px 8px rgba(0, 0, 0, 0.2));
        }

        .tagline {
            font-size: 11px;
            color: #dbeafe;
            text-transform: uppercase;
            letter-spacing: 2px;
            font-weight: 700;
        }

        /* Main Form Area (Clean White & Blue UI) */
        .main-content {
            flex: 1;
            padding: 30px 24px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: #ffffff;
        }

        .screen { 
            width: 100%; 
            display: flex; 
            flex-direction: column; 
            background: #f8fafc;
            border: 1px solid #e2e8f0;
            border-radius: 20px;
            padding: 24px 20px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.03);
        }
        
        .hidden { display: none !important; }

        .input-field {
            background: #ffffff;
            border: 1.5px solid #cbd5e1;
            border-radius: 12px;
            padding: 13px 16px;
            width: 100%;
            color: #0f172a;
            font-size: 15px;
            margin-bottom: 14px;
            outline: none;
            transition: all 0.2s ease;
            text-align: center;
            font-weight: 600;
            letter-spacing: 1px;
        }

        .input-field:focus {
            border-color: #2563eb;
            box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.12);
        }

        .input-field::placeholder { color: #94a3b8; font-weight: 500; letter-spacing: 0; }

        .btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #2563eb 0%, #1d4ed8 100%);
            border: none;
            border-radius: 12px;
            color: #ffffff;
            font-weight: 700;
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 1px;
            cursor: pointer;
            box-shadow: 0 6px 18px rgba(37, 99, 235, 0.3);
            transition: all 0.15s ease;
        }

        .btn:active { 
            transform: scale(0.98); 
            box-shadow: 0 2px 8px rgba(37, 99, 235, 0.2);
        }

        .welcome-text { color: #334155; font-size: 14px; margin-bottom: 12px; text-align: center; font-weight: 600; }
        .timer { color: #d97706; font-size: 13px; font-weight: 700; margin-bottom: 12px; text-align: center; font-family: monospace; }
        .error-text { color: #ef4444; font-size: 12px; text-align: center; margin-top: 8px; font-weight: 600; }
    </style>
</head>
<body>

    <!-- Android App Style Splash Screen -->
    <div id="splashScreen">
        <img src="https://i.imgur.com/SfJzcbI.png" alt="Gogami Logo" class="splash-logo">
        <div class="spinner"></div>
    </div>

    <div class="app-container">
        <div class="top-header">
            <img src="https://i.imgur.com/SfJzcbI.png" alt="GOGAMI" class="brand-logo">
            <div class="tagline">Official Platform</div>
        </div>

        <div class="main-content">
            <div id="phoneScreen" class="screen">
                <input type="tel" id="phoneNumber" class="input-field" placeholder="Enter Mobile Number" maxlength="10" inputmode="numeric" oninput="this.value = this.value.replace(/\D/g,'')">
                <button class="btn" id="sendOtpBtn">Login with OTP</button>
                <div id="phoneError" class="error-text"></div>
            </div>

            <div id="otpScreen" class="screen hidden">
                <div class="welcome-text">Enter OTP sent to your mobile</div>
                <div class="timer" id="timer">Second Remaining 60</div>
                <input type="text" id="otpCode" class="input-field" placeholder="Enter OTP" maxlength="6" inputmode="numeric" oninput="this.value = this.value.replace(/\D/g,'')">
                <button class="btn" id="verifyOtpBtn">VERIFY OTP</button>
                <div id="otpError" class="error-text"></div>
            </div>

            <div id="registerScreen" class="screen hidden">
                <div class="welcome-text">Complete Your Profile</div>
                <input type="text" id="regName" class="input-field" placeholder="Full Name">
                <button class="btn" id="registerBtn">Create Account & Login</button>
                <div id="regError" class="error-text"></div>
            </div>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyDLZdlEN9SEb6Z4dsuuMGsRNIzVBMwky_c",
            authDomain: "gogami-877be.firebaseapp.com",
            projectId: "gogami-877be",
            storageBucket: "gogami-877be.firebasestorage.app",
            messagingSenderId: "220921167245",
            appId: "1:220921167245:web:3ccc8b424e5bc927c291c4",
            measurementId: "G-2Q572T3D8J"
        };
        
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();
        auth.setPersistence(firebase.auth.Auth.Persistence.LOCAL);
        
        let confirmationResult = null, currentPhone = null, countdown = 0, timerInterval = null, recaptchaVerifier = null;
        
        function hideSplashScreen() {
            const splash = document.getElementById('splashScreen');
            if (splash) {
                splash.style.opacity = '0';
                splash.style.visibility = 'hidden';
            }
        }

        function showScreen(screen) {
            document.getElementById('phoneScreen').className = 'screen hidden';
            document.getElementById('otpScreen').className = 'screen hidden';
            document.getElementById('registerScreen').className = 'screen hidden';
            screen.className = 'screen';
        }
        
        function showError(elementId, message) { const el = document.getElementById(elementId); if (el) { el.innerText = message; setTimeout(() => el.innerText = '', 4000); } }
        
        function initRecaptcha() { 
            if (!recaptchaVerifier) { 
                const container = document.createElement('div'); 
                container.id = 'recaptcha-container'; 
                container.style.position = 'absolute'; 
                container.style.left = '-9999px'; 
                document.body.appendChild(container); 
                recaptchaVerifier = new firebase.auth.RecaptchaVerifier('recaptcha-container', { size: 'invisible' }); 
            } 
            return recaptchaVerifier; 
        }
        
        function startTimer(seconds, timerElementId) { 
            countdown = seconds; 
            if (timerInterval) clearInterval(timerInterval); 
            timerInterval = setInterval(() => { if (countdown <= 1) clearInterval(timerInterval); const timerEl = document.getElementById(timerElementId); if (timerEl && countdown > 0) timerEl.innerText = `Second Remaining ${countdown}`; countdown--; }, 1000); 
        }

        document.getElementById('sendOtpBtn').onclick = function() {
            const phone = document.getElementById('phoneNumber').value.replace(/\D/g, '');
            if (!phone || phone.length !== 10) { showError('phoneError', 'Enter a valid 10-digit mobile number'); return; }
            currentPhone = '+91' + phone;
            sendVerificationPhone(currentPhone, this, 'phoneError');
        };

        function sendVerificationPhone(phoneNumber, btnElement, errorId) {
            btnElement.disabled = true; btnElement.innerText = 'Sending...';
            const verifier = initRecaptcha();
            auth.signInWithPhoneNumber(phoneNumber, verifier).then(confirmation => { 
                confirmationResult = confirmation; 
                showScreen(document.getElementById('otpScreen')); 
                startTimer(60, 'timer'); 
                btnElement.disabled = false; 
                btnElement.innerText = 'Login with OTP'; 
            }).catch(error => { showError(errorId, error.message); btnElement.disabled = false; });
        }
        
        document.getElementById('verifyOtpBtn').onclick = function() {
            const code = document.getElementById('otpCode').value;
            if (!code || code.length !== 6) { showError('otpError', 'Enter 6-digit OTP'); return; }
            const btn = this; btn.disabled = true; btn.innerText = 'Verifying...';
            
            confirmationResult.confirm(code).then(result => { 
                const user = result.user; 
                db.collection('users').doc(user.uid).get().then(doc => { 
                    if (doc.exists) {
                        window.location.href = 'dashboard.html';
                    } else {
                        showScreen(document.getElementById('registerScreen'));
                        btn.disabled = false; btn.innerText = 'VERIFY OTP';
                    }
                }).catch(() => { showScreen(document.getElementById('registerScreen')); btn.disabled = false; }); 
            }).catch(error => { showError('otpError', 'Invalid OTP'); btn.disabled = false; });
        };
        
        document.getElementById('registerBtn').onclick = function() {
            const name = document.getElementById('regName').value.trim();
            if (!name) { showError('regError', 'Enter your name'); return; } 
            
            const user = auth.currentUser; if (!user) { showError('regError', 'Session expired'); return; }
            const btn = this; btn.disabled = true; btn.innerText = 'Creating Account...';
            
            db.collection('users').doc(user.uid).set({ 
                uid: user.uid, 
                phone: user.phoneNumber, 
                name: name, 
                balance: 0, 
                role: 'user', 
                createdAt: new Date() 
            }).then(() => { 
                window.location.href = 'dashboard.html'; 
            }).catch(error => { 
                showError('regError', error.message); 
                btn.disabled = false; btn.innerText = 'Create Account & Login'; 
            });
        };

        auth.onAuthStateChanged(user => { 
            if (user) { 
                db.collection('users').doc(user.uid).get().then(doc => { 
                    if (doc.exists) { 
                        window.location.href = 'dashboard.html'; 
                    } else { 
                        showScreen(document.getElementById('registerScreen')); 
                        hideSplashScreen();
                    } 
                }).catch(() => {
                    showScreen(document.getElementById('phoneScreen'));
                    hideSplashScreen();
                }); 
            } else { 
                showScreen(document.getElementById('phoneScreen')); 
                hideSplashScreen();
            } 
        });
    </script>
</body>
</html>
