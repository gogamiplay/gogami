<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>GOGAMI - Dashboard</title>
    <!-- Supabase JS SDK v2 -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <!-- OneSignal SDK -->
    <script src="https://cdn.onesignal.com/sdks/web/v16/OneSignalSDK.page.js" defer></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
        body { background: #0f172a; color: #f8fafc; padding-bottom: 90px; min-height: 100vh; }
        .app-container { max-width: 480px; margin: 0 auto; background: #0f172a; min-height: 100vh; padding: 16px; position: relative; }
        
        .header { display: flex; align-items: center; justify-content: space-between; padding: 6px 0 16px 0; border-bottom: 1px solid #1e293b; }
        .logo-title { font-weight: 900; font-size: 22px; letter-spacing: 2px; background: linear-gradient(45deg, #3b82f6, #ef4444, #10b981, #f59e0b); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .balance-card { background: #1e293b; border: 1px solid #334155; padding: 6px 14px; border-radius: 20px; color: #10b981; font-weight: 700; font-size: 14px; cursor: pointer; }
        
        .notice-bar { background: rgba(59, 130, 246, 0.1); border: 1px solid rgba(59, 130, 246, 0.2); border-radius: 10px; padding: 10px 14px; margin: 16px 0; color: #93c5fd; font-size: 12px; font-weight: 500; }
        
        .action-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; margin-bottom: 20px; }
        .action-btn { background: #1e293b; border: 1px solid #334155; border-radius: 12px; padding: 14px; text-align: center; color: #fff; text-decoration: none; font-weight: 700; font-size: 13px; text-transform: uppercase; box-shadow: 0 4px 10px rgba(0,0,0,0.15); }
        .action-btn.deposit { background: linear-gradient(135deg, #10b981, #059669); border: none; }
        .action-btn.withdraw { background: linear-gradient(135deg, #ef4444, #dc2626); border: none; }

        .section-title { font-size: 14px; font-weight: 800; color: #94a3b8; text-transform: uppercase; margin-bottom: 12px; letter-spacing: 0.5px; }
        
        .market-card { background: #1e293b; border: 1px solid #334155; border-radius: 14px; padding: 16px; margin-bottom: 12px; display: flex; justify-content: space-between; align-items: center; }
        .market-info h4 { font-size: 16px; font-weight: 800; color: #f8fafc; margin-bottom: 4px; }
        .market-number { font-family: monospace; font-size: 18px; color: #38bdf8; font-weight: 800; letter-spacing: 1px; }
        .market-timing { font-size: 11px; color: #64748b; margin-top: 4px; font-weight: 600; }
        .play-btn { background: #3b82f6; border: none; color: #fff; padding: 10px 18px; border-radius: 8px; font-weight: 700; font-size: 12px; cursor: pointer; text-transform: uppercase; text-decoration: none; }
        .play-btn.closed { background: #334155; color: #64748b; cursor: not-allowed; }

        .bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; max-width: 480px; margin: 0 auto; background: #1e293b; display: flex; justify-content: space-around; align-items: center; padding: 10px 6px 14px 6px; border-top: 1px solid #334155; z-index: 1000; height: 75px; }
        .nav-item { text-align: center; color: #94a3b8; cursor: pointer; font-size: 12px; flex: 1; font-weight: 600; text-decoration: none; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        .nav-item.active { color: #3b82f6; }
        .nav-item-home { position: relative; top: -20px; background: #3b82f6; color: #fff !important; width: 60px; height: 60px; border-radius: 50%; box-shadow: 0 4px 10px rgba(59, 130, 246, 0.4); border: 4px solid #0f172a; }
    </style>
</head>
<body>
<div class="app-container">
    <div class="header">
        <span class="logo-title">GOGAMI</span>
        <div class="balance-card" onclick="location.href='funds.html'">₹<span id="userBalance">0</span></div>
    </div>

    <div class="notice-bar" id="noticeBar">Loading notice...</div>

    <div class="action-grid">
        <a href="deposit.html" class="action-btn deposit">➕ Add Cash</a>
        <a href="withdraw.html" class="action-btn withdraw">💸 Withdraw</a>
    </div>

    <div class="section-title">Live Betting Markets</div>
    <div id="marketsList">
        <div style="text-align:center; color:#64748b; padding:30px; font-size:13px;">Fetching Live Markets...</div>
    </div>

    <div class="bottom-nav">
        <a href="transactions.html" class="nav-item"><span>Passbook</span></a>
        <a href="mybids.html" class="nav-item"><span>My Bids</span></a>
        <a href="index.html" class="nav-item nav-item-home"><span>Home</span></a>
        <a href="funds.html" class="nav-item"><span>Funds</span></a>
        <a href="chat.html" class="nav-item"><span>Support</span></a>
    </div>
</div>

<script>
    const SUPABASE_URL = "https://lcrzohaqjzwjhsyncaim.supabase.co";
    const SUPABASE_ANON_KEY = "sb_publishable_2iAoTgXx8S5XeWy04oiICA_nedHJR_R";
    const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    let currentUser = null;

    function getSafeUid() {
        let uid = localStorage.getItem('userUid') || localStorage.getItem('uid');
        if(!uid) {
            uid = 'user_' + Math.random().toString(36).substring(2, 9);
            localStorage.setItem('userUid', uid);
        }
        return uid;
    }

    // OneSignal Push Notification Setup
    window.OneSignalDeferred = window.OneSignalDeferred || [];
    OneSignalDeferred.push(async function(OneSignal) {
        const { data } = await supabaseClient.from('settings').select('value').eq('id', 'onesignal_appid').single();
        if(data && data.value) {
            await OneSignal.init({
                appId: data.value,
            });
        }
    });

    window.onload = async () => {
        await initUser();
        await loadNotice();
        await loadMarkets();
        subscribeToRealtime();
    };

    async function initUser() {
        let uid = getSafeUid();
        let { data: user } = await supabaseClient.from('users').select('*').eq('id', uid).single();
        
        if(!user) {
            const { data: newUser } = await supabaseClient.from('users').insert([{
                id: uid, name: 'User ' + uid.substring(5), balance: 0
            }]).select().single();
            user = newUser;
        }

        currentUser = user;
        document.getElementById('userBalance').innerText = (user?.balance || 0).toLocaleString();
    }

    async function loadNotice() {
        const { data } = await supabaseClient.from('settings').select('text').eq('id', 'notice').single();
        document.getElementById('noticeBar').innerText = data?.text || "Welcome to GOGAMI Matka Play!";
    }

    async function loadMarkets() {
        const { data: markets } = await supabaseClient.from('markets').select('*').order('serial_no', { ascending: true });
        let container = document.getElementById('marketsList');

        if(!markets || markets.length === 0) {
            container.innerHTML = '<div style="text-align:center; color:#64748b; padding:20px;">No Markets Available</div>';
            return;
        }

        container.innerHTML = markets.map(m => {
            let isClosed = m.status === 'close' || m.status === 'closed' || m.status === 'holiday';
            return `
            <div class="market-card">
                <div class="market-info">
                    <h4>${m.name}</h4>
                    <div class="market-number">${m.numbers || '***-**-***'}</div>
                    <div class="market-timing">Open: ${m.open_bid_end || '-'} | Close: ${m.close_bid_end || '-'}</div>
                </div>
                ${isClosed ? 
                    `<button class="play-btn closed" disabled>CLOSED</button>` : 
                    `<a href="betting.html?market=${encodeURIComponent(m.name)}" class="play-btn">PLAY NOW</a>`
                }
            </div>`;
        }).join('');
    }

    function subscribeToRealtime() {
        supabaseClient.channel('public:markets')
            .on('postgres_changes', { event: '*', schema: 'public', table: 'markets' }, () => {
                loadMarkets();
            }).subscribe();

        let uid = getSafeUid();
        supabaseClient.channel('public:users:' + uid)
            .on('postgres_changes', { event: 'UPDATE', schema: 'public', table: 'users', filter: `id=eq.${uid}` }, (payload) => {
                document.getElementById('userBalance').innerText = (payload.new.balance || 0).toLocaleString();
            }).subscribe();
    }
</script>
</body>
</html>
