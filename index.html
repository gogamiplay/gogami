<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>GOGAMI - Login & Register</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
        
        body { background: #0f172a; color: #f8fafc; min-height: 100vh; display: flex; justify-content: center; align-items: center; padding: 16px; }
        .app-container { width: 100%; max-width: 420px; background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(12px); border-radius: 20px; padding: 28px 22px; border: 1px solid rgba(255,255,255,0.08); box-shadow: 0 10px 30px rgba(0,0,0,0.35); position: relative; }
        
        .loader-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #0f172a; z-index: 9999; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        .splash-logo { font-size: 32px; font-weight: 900; letter-spacing: 4px; color: #3b82f6; animation: pulse 1.2s infinite; }
        @keyframes pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.05); } }

        .brand-header { text-align: center; margin-bottom: 24px; }
        .brand-title { font-size: 28px; font-weight: 900; letter-spacing: 3px; color: #3b82f6; }
        .brand-subtitle { font-size: 13px; color: #94a3b8; font-weight: 600; margin-top: 4px; }

        .auth-tab-bar { display: flex; background: #0f172a; border-radius: 10px; padding: 4px; margin-bottom: 20px; border: 1px solid #334155; }
        .auth-tab { flex: 1; text-align: center; padding: 10px; border-radius: 8px; font-size: 13px; font-weight: 700; color: #94a3b8; cursor: pointer; text-transform: uppercase; transition: all 0.2s ease; }
        .auth-tab.active { background: #3b82f6; color: #fff; }

        .form-group { margin-bottom: 14px; }
        .form-label { display: block; font-size: 11px; font-weight: 700; color: #94a3b8; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 6px; }
        .form-input { width: 100%; padding: 12px 14px; background: #0f172a; border: 1px solid #334155; border-radius: 10px; font-size: 14px; color: #fff; font-weight: 600; outline: none; }
        .form-input:focus { border-color: #3b82f6; }
        .form-input::placeholder { color: #475569; font-weight: 500; }

        .auth-btn { width: 100%; padding: 14px; background: #3b82f6; border: none; border-radius: 10px; color: #fff; font-weight: 700; font-size: 14px; text-transform: uppercase; cursor: pointer; letter-spacing: 0.5px; box-shadow: 0 4px 12px rgba(59, 130, 246, 0.25); margin-top: 8px; }
        .auth-btn:active { background: #2563eb; }

        .forgot-link { display: block; text-align: right; font-size: 12px; color: #93c5fd; font-weight: 600; text-decoration: none; margin-top: -6px; margin-bottom: 14px; cursor: pointer; }

        .msg-box { padding: 12px; border-radius: 8px; text-align: center; margin-top: 14px; font-size: 13px; font-weight: 600; display: none; }
        .msg-success { background: rgba(16, 185, 129, 0.15); color: #34d399; border: 1px solid rgba(16, 185, 129, 0.3); }
        .msg-error { background: rgba(239, 68, 68, 0.15); color: #f87171; border: 1px solid rgba(239, 68, 68, 0.3); }

        .hidden { display: none !important; }
    </style>
</head>
<body>

<div class="app-container">
    <div class="brand-header">
        <div class="brand-title">GOGAMI</div>
        <div class="brand-subtitle">Official Trading Portal</div>
    </div>

    <div class="auth-tab-bar">
        <div class="auth-tab active" id="tabLogin" onclick="switchTab('login')">Login</div>
        <div class="auth-tab" id="tabRegister" onclick="switchTab('register')">Register</div>
    </div>

    <!-- LOGIN FORM -->
    <div id="loginForm">
        <div class="form-group">
            <label class="form-label">Phone Number</label>
            <input type="tel" id="loginPhone" class="form-input" placeholder="Enter 10-digit number" maxlength="10">
        </div>
        <div class="form-group">
            <label class="form-label">4-Digit MPIN / Password</label>
            <input type="password" id="loginPin" class="form-input" placeholder="Enter MPIN" maxlength="6">
        </div>
        <span class="forgot-link" onclick="handleForgotPin()">Forgot MPIN?</span>
        <button class="auth-btn" onclick="executeLogin()">Log In</button>
    </div>

    <!-- REGISTER FORM -->
    <div id="registerForm" class="hidden">
        <div class="form-group">
            <label class="form-label">Full Name</label>
            <input type="text" id="regName" class="form-input" placeholder="Enter your full name">
        </div>
        <div class="form-group">
            <label class="form-label">Phone Number</label>
            <input type="tel" id="regPhone" class="form-input" placeholder="Enter 10-digit number" maxlength="10">
        </div>
        <div class="form-group">
            <label class="form-label">Set 4-Digit MPIN</label>
            <input type="password" id="regPin" class="form-input" placeholder="Create 4-digit MPIN" maxlength="4">
        </div>
        <button class="auth-btn" onclick="executeRegister()">Create Account</button>
    </div>

    <div id="authMsg" class="msg-box"></div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyBeGpb7V0i5GN1opY9JECHxQIGvHFDPX38",
        authDomain: "gogami-877be.firebaseapp.com",
        projectId: "gogami-877be",
        storageBucket: "gogami-877be.firebasestorage.app",
        messagingSenderId: "843686112399",
        appId: "1:843686112399:web:9c20a96831e6a94cd814fa"
    };
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.firestore();

    function showLoader() {
        let div = document.createElement('div');
        div.className = 'loader-overlay';
        div.id = 'pageLoader';
        div.innerHTML = '<div class="splash-logo">GOGAMI</div>';
        document.body.appendChild(div);
    }
    function hideLoader() {
        let el = document.getElementById('pageLoader');
        if(el) el.remove();
    }

    function switchTab(type) {
        document.getElementById('authMsg').style.display = 'none';
        if(type === 'login') {
            document.getElementById('loginForm').classList.remove('hidden');
            document.getElementById('registerForm').classList.add('hidden');
            document.getElementById('tabLogin').classList.add('active');
            document.getElementById('tabRegister').classList.remove('active');
        } else {
            document.getElementById('loginForm').classList.add('hidden');
            document.getElementById('registerForm').classList.remove('hidden');
            document.getElementById('tabLogin').classList.remove('active');
            document.getElementById('tabRegister').classList.add('active');
        }
    }

    function showMsg(msg, type) {
        let box = document.getElementById('authMsg');
        box.innerText = msg;
        box.className = `msg-box msg-${type}`;
        box.style.display = 'block';
    }

    async function executeLogin() {
        let phone = document.getElementById('loginPhone').value.trim();
        let pin = document.getElementById('loginPin').value.trim();

        if(!phone || phone.length !== 10) { showMsg('Please enter valid 10-digit phone number', 'error'); return; }
        if(!pin) { showMsg('Please enter your MPIN', 'error'); return; }

        let email = `${phone}@gogami.com`;
        showLoader();

        try {
            let res = await auth.signInWithEmailAndPassword(email, pin);
            await db.collection('users').doc(res.user.uid).update({
                isOnline: true,
                lastActive: firebase.firestore.FieldValue.serverTimestamp()
            });
            window.location.href = 'dashboard.html';
        } catch(e) {
            hideLoader();
            showMsg('Invalid credentials or user does not exist', 'error');
        }
    }

    async function executeRegister() {
        let name = document.getElementById('regName').value.trim();
        let phone = document.getElementById('regPhone').value.trim();
        let pin = document.getElementById('regPin').value.trim();

        if(!name) { showMsg('Please enter your name', 'error'); return; }
        if(!phone || phone.length !== 10) { showMsg('Please enter valid 10-digit phone number', 'error'); return; }
        if(!pin || pin.length !== 4) { showMsg('MPIN must be exactly 4 digits', 'error'); return; }

        let email = `${phone}@gogami.com`;
        showLoader();

        try {
            let userCheck = await db.collection('users').where('phone', '==', phone).get();
            if(!userCheck.empty) {
                hideLoader();
                showMsg('Mobile number already registered! Please log in.', 'error');
                return;
            }

            let res = await auth.createUserWithEmailAndPassword(email, pin);
            await db.collection('users').doc(res.user.uid).set({
                uid: res.user.uid,
                name: name,
                phone: phone,
                pin: pin,
                balance: 0,
                isOnline: true,
                createdAt: firebase.firestore.FieldValue.serverTimestamp(),
                lastActive: firebase.firestore.FieldValue.serverTimestamp()
            });

            window.location.href = 'dashboard.html';
        } catch(e) {
            hideLoader();
            showMsg('Registration failed: ' + e.message, 'error');
        }
    }

    function handleForgotPin() {
        alert("Please contact Live Support or Admin to reset your MPIN.");
    }

    showLoader();
    auth.onAuthStateChanged(user => {
        if(user) {
            window.location.href = 'dashboard.html';
        } else {
            hideLoader();
        }
    });
</script>
</body>
</html>
