<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>GOGAMI - Dashboard</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
        body { background: #0f172a; color: #f8fafc; padding-bottom: 90px; min-height: 100vh; }
        .app-container { max-width: 480px; margin: 0 auto; background: #0f172a; min-height: 100vh; padding: 16px; position: relative; }
        
        .loader-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #0f172a; z-index: 9999; display: flex; justify-content: center; align-items: center; }
        .loader-spinner { width: 40px; height: 40px; border: 3px solid rgba(255,255,255,0.1); border-top: 3px solid #3b82f6; border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        /* Modern Header Layout */
        .app-header { display: flex; align-items: center; justify-content: space-between; padding: 4px 0 16px 0; background: #0f172a; }
        .menu-btn { background: none; border: none; color: #f8fafc; font-size: 24px; cursor: pointer; }
        
        .app-title {
            font-weight: 800; font-size: 20px; letter-spacing: 2px;
            background: linear-gradient(45deg, #3b82f6, #ef4444, #10b981, #f59e0b, #3b82f6);
            background-size: 400% 400%; -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            animation: gradientShift 8s ease infinite;
        }
        @keyframes gradientShift { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }

        .balance-pill { background: #1e293b; border: 1px solid #334155; padding: 6px 14px; border-radius: 20px; color: #10b981; font-weight: 700; font-size: 14px; cursor: pointer; }

        /* Wallet Action Buttons Grid */
        .action-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; margin-bottom: 20px; }
        .action-btn { background: #1e293b; border: 1px solid #334155; border-radius: 12px; padding: 14px; text-align: center; text-decoration: none; color: #f8fafc; font-weight: 700; font-size: 14px; display: flex; align-items: center; justify-content: center; gap: 8px; }
        .action-btn.deposit-theme { background: #10b981; border-color: #10b981; color: #fff; }
        .action-btn.withdraw-theme { background: #3b82f6; border-color: #3b82f6; color: #fff; }

        /* Markets List Framework */
        .section-title { font-size: 13px; font-weight: 700; color: #64748b; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 12px; }
        .market-card { background: #1e293b; border-radius: 14px; padding: 16px; margin-bottom: 12px; border: 1px solid #334155; display: flex; justify-content: space-between; align-items: center; }
        .market-info { display: flex; flex-direction: column; gap: 4px; }
        .market-name { font-size: 16px; font-weight: 700; color: #f8fafc; text-transform: uppercase; }
        .market-result { font-size: 18px; font-weight: 800; color: #3b82f6; letter-spacing: 1px; }
        .market-time { font-size: 11px; color: #94a3b8; font-weight: 500; }
        
        .play-btn { background: #10b981; color: #fff; border: none; padding: 10px 20px; border-radius: 8px; font-weight: 700; font-size: 13px; cursor: pointer; text-transform: uppercase; text-decoration: none; }
        .play-btn.closed { background: #ef4444; cursor: not-allowed; opacity: 0.8; }

        /* Bottom Fixed Navigation Bar */
        .bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; max-width: 480px; margin: 0 auto; background: #1e293b; display: flex; justify-content: space-around; align-items: center; padding: 10px 6px 14px 6px; border-top: 1px solid #334155; z-index: 1000; height: 75px; }
        .nav-item { text-align: center; color: #94a3b8; cursor: pointer; font-size: 13px; flex: 1; font-weight: 600; text-decoration: none; display: flex; flex-direction: column; justify-content: center; align-items: center; height: 100%; }
        .nav-item.active { color: #3b82f6; }
        .nav-item-home { position: relative; top: -20px; background: #3b82f6; color: #fff !important; width: 64px; height: 64px; max-width: 64px; border-radius: 50%; box-shadow: 0 4px 10px rgba(59, 130, 246, 0.4); border: 4px solid #0f172a; }
        .nav-item-home span { font-size: 12px; font-weight: 700; }

        /* Modal Containers */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(15, 23, 42, 0.7); backdrop-filter: blur(4px); z-index: 2000; justify-content: center; align-items: center; }
        .modal-content { background: #1e293b; border-radius: 16px; padding: 24px; width: 90%; max-width: 340px; border: 1px solid #334155; }
        .modal-btn { width: 100%; padding: 11px; background: #3b82f6; border: none; border-radius: 8px; color: #fff; font-weight: 600; cursor: pointer; margin-top: 10px; font-size: 14px; }
        .logout-btn { background: #ef4444; }
        .close-modal { background: #334155; color: #cbd5e1; }
    </style>
</head>
<body>
<div class="app-container">
    
    <div class="app-header">
        <button class="menu-btn" onclick="showProfileModal()">☰</button>
        <span class="app-title">GOGAMI</span>
        <div class="balance-pill" onclick="showBalance()">₹<span id="userBalance">0</span></div>
    </div>

    <div class="action-grid">
        <a href="deposit.html" class="action-btn deposit-theme">➕ Deposit</a>
        <a href="withdraw.html" class="action-btn withdraw-theme">💸 Withdraw</a>
    </div>

    <div class="section-title">Live Markets</div>
    <div id="marketsList">
        <div style="text-align: center; padding: 40px; color: #64748b;">Loading Markets...</div>
    </div>

    <!-- Corrected Exact Navigation Links -->
    <div class="bottom-nav">
        <a href="mybids.html" class="nav-item"><span>Passbook</span></a>
        <a href="mybids.html" class="nav-item"><span>My Bids</span></a>
        <a href="dashboard.html" class="nav-item nav-item-home"><span>Home</span></a>
        <a href="funds.html" class="nav-item"><span>Funds</span></a>
        <a href="chat.html" class="nav-item"><span>Support</span></a>
    </div>
</div>

<div id="profileModal" class="modal"><div class="modal-content"><h3>My Profile</h3><div id="profileInfo"></div><button class="modal-btn logout-btn" onclick="logout()">🚪 Logout</button><button class="modal-btn close-modal" onclick="closeProfileModal()">Close</button></div></div>

<script>
    const firebaseConfig = { 
        apiKey: "AIzaSyDLZdlEN9SEb6Z4dsuuMGsRNIzVBMwky_c", 
        authDomain: "gogami-877be.firebaseapp.com", 
        projectId: "gogami-877be", 
        storageBucket: "gogami-877be.firebasestorage.app", 
        messagingSenderId: "220921167245", 
        appId: "1:220921167245:web:3ccc8b424e5bc927c291c4",
        measurementId: "G-2Q572T3D8J"
    };
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.firestore();
    auth.setPersistence(firebase.auth.Auth.Persistence.LOCAL);

    let currentUserData = null;

    function showLoader() { 
        if(!document.getElementById('pageLoader')) {
            let div = document.createElement('div'); div.className = 'loader-overlay'; div.id = 'pageLoader'; 
            div.innerHTML = '<div class="loader-spinner"></div>'; document.body.appendChild(div); 
        }
    }
    function hideLoader() { let el = document.getElementById('pageLoader'); if(el) el.remove(); }

    showLoader();
    auth.onAuthStateChanged(async (user) => {
        if (!user) {
            window.location.href = 'index.html';
        } else {
            try {
                await loadUserData(user.uid);
                await loadMarkets();
            } catch(e) {}
            hideLoader();
        }
    });

    async function loadUserData(uid) {
        let doc = await db.collection('users').doc(uid).get();
        if (doc.exists) {
            currentUserData = doc.data();
            document.getElementById('userBalance').innerText = currentUserData.balance || 0;
        }
    }

    async function loadMarkets() {
        let container = document.getElementById('marketsList');
        db.collection('markets').onSnapshot(snapshot => {
            if (snapshot.empty) {
                container.innerHTML = '<div style="text-align: center; padding: 40px; color: #64748b;">No Markets Available</div>';
                return;
            }
            let html = '';
            snapshot.forEach(doc => {
                let m = doc.data();
                let isClosed = m.status === 'close' || m.status === 'holiday';
                let btnText = isClosed ? 'Closed' : 'Play';
                let btnClass = isClosed ? 'play-btn closed' : 'play-btn';
                let targetUrl = isClosed ? '#' : `betting.html?market=${encodeURIComponent(m.name)}&marketId=${doc.id}&status=${m.status}`;

                html += `
                    <div class="market-card">
                        <div class="market-info">
                            <span class="market-name">${m.name}</span>
                            <span class="market-result">${m.result || '***-**-***'}</span>
                            <span class="market-time">Open: ${m.openTime || '--'} | Close: ${m.closeTime || '--'}</span>
                        </div>
                        <a href="${targetUrl}" class="${btnClass}">${btnText}</a>
                    </div>
                `;
            });
            container.innerHTML = html;
        });
    }

    function showBalance() { alert(`💰 Balance: ₹${currentUserData?.balance || 0}`); }
    function showProfileModal() { 
        if(currentUserData){ 
            document.getElementById('profileInfo').innerHTML = `<div style="text-align:center; margin-bottom:14px;"><div style="font-size:18px; font-weight:700; color:#f8fafc;">${currentUserData.name}</div><div style="color:#94a3b8; font-size:13px; margin:2px 0 6px 0;">${currentUserData.phone}</div><div style="font-size:20px; font-weight:800; color:#10b981;">₹${currentUserData.balance}</div></div>`; 
            document.getElementById('profileModal').style.display='flex'; 
        } 
    }
    function closeProfileModal() { document.getElementById('profileModal').style.display='none'; }
    function logout() { auth.signOut().then(() => { sessionStorage.clear(); window.location.href='index.html'; }); }
</script>
</body>
</html>
