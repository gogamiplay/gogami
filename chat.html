<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>GOGAMI - Live Support Chat</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-storage-compat.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
        html, body { height: 100%; background: #0f172a; color: #fff; }
        body { display: flex; flex-direction: column; overflow: hidden; }

        .chat-header { background: #1e293b; padding: 0 16px; height: 60px; display: flex; align-items: center; border-bottom: 1px solid #334155; }
        .back-btn { background: none; border: none; color: #fff; font-size: 22px; cursor: pointer; margin-right: 12px; }
        .chat-title { color: #3b82f6; font-size: 16px; font-weight: 700; }

        .chat-messages { flex: 1; overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 12px; }
        .message { max-width: 75%; padding: 10px 14px; border-radius: 12px; font-size: 14px; word-wrap: break-word; }
        .user-message { background: #3b82f6; color: #fff; align-self: flex-end; }
        .support-message { background: #1e293b; color: #f1f5f9; align-self: flex-start; }
        
        .chat-input-area { background: #1e293b; padding: 10px; display: flex; gap: 10px; align-items: center; }
        .chat-input-field { flex: 1; background: #0f172a; border-radius: 8px; padding: 10px 14px; }
        .chat-input { width: 100%; background: transparent; border: none; outline: none; color: #fff; }
        .send-btn { background: #10b981; border: none; border-radius: 8px; height: 40px; padding: 0 18px; color: #fff; font-weight: 700; cursor: pointer; }
    </style>
</head>
<body>

<div class="chat-header">
    <button class="back-btn" onclick="window.location.href='dashboard.html'">←</button>
    <span class="chat-title">GOGAMI SUPPORT</span>
</div>

<div class="chat-messages" id="chatMessages">
    <div style="background:#1e293b; padding:16px; border-radius:12px; text-align:center;">
        <h3>Welcome to GOGAMI Support!</h3>
        <p style="color:#94a3b8; font-size:13px; margin-top:4px;">We are available 24/7 to assist you.</p>
    </div>
</div>

<div class="chat-input-area">
    <div class="chat-input-field">
        <input type="text" class="chat-input" id="messageInput" placeholder="Type your message..." onkeypress="if(event.key==='Enter') sendMessage()">
    </div>
    <button class="send-btn" onclick="sendMessage()">Send</button>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyBeGpb7V0i5GN1opY9JECHxQIGvHFDPX38",
        authDomain: "gogami-877be.firebaseapp.com",
        projectId: "gogami-877be",
        storageBucket: "gogami-877be.firebasestorage.app",
        messagingSenderId: "843686112399",
        appId: "1:843686112399:web:9c20a96831e6a94cd814fa"
    };
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.firestore();

    let currentUser = null, chatRoomId = null;

    auth.onAuthStateChanged(async (user) => {
        if (!user) { window.location.href = 'index.html'; return; }
        currentUser = user;
        chatRoomId = `chat_${user.uid}`;
        setupChat();
    });

    function setupChat() {
        db.collection('chats').doc(chatRoomId).collection('messages').orderBy('timestamp', 'asc').onSnapshot(snapshot => {
            let html = '';
            snapshot.forEach(doc => {
                let msg = doc.data();
                let isUser = msg.senderId === currentUser.uid;
                html += `<div class="message ${isUser ? 'user-message' : 'support-message'}">${msg.text}</div>`;
            });
            const c = document.getElementById('chatMessages');
            c.innerHTML = html;
            c.scrollTop = c.scrollHeight;
        });
    }

    async function sendMessage() {
        let input = document.getElementById('messageInput');
        let text = input.value.trim();
        if(!text) return;
        input.value = '';

        await db.collection('chats').doc(chatRoomId).collection('messages').add({
            senderId: currentUser.uid,
            text: text,
            timestamp: firebase.firestore.FieldValue.serverTimestamp()
        });
    }
</script>
</body>
</html>
