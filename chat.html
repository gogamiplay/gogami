<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>GOMAGI - Live Support Chat</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-storage-compat.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
        
        html, body { height: 100%; background: #090d16; color: #f8fafc; }
        body { display: flex; flex-direction: column; overflow: hidden; position: fixed; top: 0; left: 0; right: 0; bottom: 0; width: 100%; }

        .loader-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #090d16; z-index: 9999; display: flex; justify-content: center; align-items: center; }
        .loader-spinner { width: 40px; height: 40px; border: 3px solid rgba(255,255,255,0.1); border-top: 3px solid #2563eb; border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        /* Support Header Bar Layout */
        .chat-header {
            background: #0f172a;
            padding: 0 16px;
            height: 60px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid rgba(255,255,255,0.05);
            flex-shrink: 0;
            z-index: 1000;
        }
        .back-btn {
            background: none;
            border: none;
            color: #94a3b8;
            font-size: 22px;
            cursor: pointer;
            display: flex;
            align-items: center;
        }
        .header-meta-box {
            flex: 1;
            margin-left: 14px;
            display: flex;
            flex-direction: column;
        }
        .chat-title {
            color: #f8fafc;
            font-size: 15px;
            font-weight: 800;
            letter-spacing: 0.5px;
            text-transform: uppercase;
        }
        .status {
            font-size: 11px;
            color: #10b981;
            font-weight: 600;
            margin-top: 1px;
        }
        .header-logo-img {
            height: 28px;
            object-fit: contain;
        }

        /* Message Stream Section */
        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            background: #090d16;
            -webkit-overflow-scrolling: touch;
        }
        .message {
            max-width: 80%;
            padding: 10px 14px;
            border-radius: 14px;
            font-size: 13.5px;
            line-height: 1.4;
            word-wrap: break-word;
            display: flex;
            flex-direction: column;
        }
        .user-message {
            background: #2563eb;
            color: #fff;
            align-self: flex-end;
            border-bottom-right-radius: 2px;
        }
        .support-message {
            background: #151c2c;
            color: #f8fafc;
            align-self: flex-start;
            border-bottom-left-radius: 2px;
            border: 1px solid rgba(255,255,255,0.05);
        }
        .message-time {
            font-size: 10px;
            margin-top: 4px;
            opacity: 0.6;
            align-self: flex-end;
            font-family: monospace;
        }
        .message-image {
            max-width: 100%;
            max-height: 220px;
            border-radius: 8px;
            margin-top: 2px;
            object-fit: cover;
            cursor: pointer;
        }
        
        .welcome-msg {
            background: #151c2c;
            border-radius: 14px;
            padding: 18px 16px;
            text-align: center;
            margin: 10px 4px 20px 4px;
            border: 1px dashed rgba(255,255,255,0.1);
        }
        .welcome-msg h3 {
            color: #f8fafc;
            margin-bottom: 6px;
            font-size: 15px;
            font-weight: 700;
        }
        .welcome-msg p {
            color: #64748b;
            font-size: 12px;
            line-height: 1.5;
        }

        .typing-indicator {
            color: #64748b;
            font-size: 11px;
            padding: 6px 16px;
            font-style: italic;
            background: #090d16;
            flex-shrink: 0;
            font-weight: 600;
        }

        /* Console Input Panel */
        .chat-input-area {
            background: #0f172a;
            padding: 10px 14px;
            display: flex;
            gap: 10px;
            flex-shrink: 0;
            align-items: center;
            min-height: 64px;
            border-top: 1px solid rgba(255,255,255,0.05);
        }
        .image-btn {
            background: #151c2c;
            border: none;
            border-radius: 10px;
            width: 42px;
            height: 42px;
            color: #fff;
            font-size: 16px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }
        .chat-input-field {
            flex: 1;
            background: #151c2c;
            border-radius: 10px;
            padding: 10px 14px;
            display: flex;
            align-items: center;
            height: 42px;
        }
        .chat-input {
            width: 100%;
            background: transparent;
            border: none;
            outline: none;
            color: #fff;
            font-size: 13.5px;
            font-weight: 500;
            -webkit-user-select: text;
            user-select: text;
        }
        .chat-input::placeholder { color: #52607a; }
        
        .send-btn {
            background: #2563eb;
            border: none;
            border-radius: 10px;
            height: 42px;
            padding: 0 18px;
            color: #fff;
            font-weight: 700;
            cursor: pointer;
            font-size: 12px;
            letter-spacing: 0.5px;
            text-transform: uppercase;
            flex-shrink: 0;
        }
        .send-btn:active { background: #1d4ed8; }

        /* Media Modal View Overlay */
        .image-modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(9, 13, 22, 0.95);
            backdrop-filter: blur(4px);
            z-index: 10000;
            justify-content: center;
            align-items: center;
        }
        .image-modal img { max-width: 90%; max-height: 85%; border-radius: 10px; }
        .image-modal-close {
            position: absolute;
            top: 20px;
            right: 20px;
            background: none;
            border: none;
            color: #fff;
            font-size: 24px;
            cursor: pointer;
        }
    </style>
</head>
<body>
    
    <div class="chat-header">
        <button class="back-btn" onclick="goBack()">←</button>
        <div class="header-meta-box">
            <span class="chat-title">GOMAGI SUPPORT</span>
            <span class="status">● Online Support</span>
        </div>
        <img src="https://i.imgur.com/Leuze73.png" alt="GOMAGI Logo" class="header-logo-img">
    </div>

    <div class="chat-messages" id="chatMessages">
        <div class="welcome-msg">
            <h3>Welcome to GOMAGI Support!</h3>
            <p>Our team is available to assist you.<br>Send a message and we will respond shortly.</p>
        </div>
    </div>

    <div class="typing-indicator" id="typingIndicator" style="display: none;">Support assistant is typing...</div>

    <div class="chat-input-area">
        <button class="image-btn" onclick="document.getElementById('imageInput').click()">📷</button>
        <input type="file" id="imageInput" accept="image/*" style="display:none" onchange="sendImage(this)">
        <div class="chat-input-field">
            <input type="text" class="chat-input" id="messageInput" placeholder="Type your message..." onkeypress="if(event.key==='Enter') sendMessage()">
        </div>
        <button class="send-btn" onclick="sendMessage()">Send</button>
    </div>

    <div id="imageModal" class="image-modal" onclick="closeImageModal()">
        <span class="image-modal-close">✕</span>
        <img id="modalImage" src="">
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyDLZdlEN9SEb6Z4dsuuMGsRNIzVBMwky_c",
            authDomain: "gogami-877be.firebaseapp.com",
            databaseURL: "https://gogami-877be-default-rtdb.firebaseio.com",
            projectId: "gogami-877be",
            storageBucket: "gogami-877be.firebasestorage.app",
            messagingSenderId: "220921167245",
            appId: "1:220921167245:web:3ccc8b424e5bc927c291c4",
            measurementId: "G-2Q572T3D8J"
        };

        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();
        const storage = firebase.storage();

        function showLoader() {
            let div = document.createElement('div'); div.className = 'loader-overlay'; div.id = 'pageLoader'; 
            div.innerHTML = '<div class="loader-spinner"></div>'; document.body.appendChild(div);
        }
        function hideLoader() { let el = document.getElementById('pageLoader'); if (el) el.remove(); }

        let currentUser = null, currentUserData = null, chatRoomId = null;

        showLoader();
        auth.onAuthStateChanged(async (user) => {
            if (!user) { window.location.href = 'index.html'; return; }

            // USER BLOCK CHECK GUARD
            const userDoc = await db.collection('users').doc(user.uid).get();
            if (userDoc.exists && userDoc.data().blocked === true) {
                alert('🚫 Your account has been blocked by Admin.');
                await auth.signOut();
                window.location.href = 'index.html';
                return;
            }

            currentUser = user;
            await loadUserData();
            setupChat();
            hideLoader();
        });

        async function loadUserData() {
            try {
                const doc = await db.collection('users').doc(currentUser.uid).get();
                if (doc.exists) {
                    currentUserData = doc.data();
                    chatRoomId = `chat_${currentUser.uid}`;
                    await db.collection('chats').doc(chatRoomId).set({
                        userId: currentUser.uid, 
                        userName: currentUserData?.name || 'User', 
                        userPhone: currentUserData?.phone || '', 
                        lastActive: firebase.firestore.FieldValue.serverTimestamp()
                    }, { merge: true });
                }
            } catch (e) { console.error("Error loading user context:", e); }
        }

        function setupChat() {
            if (!chatRoomId) return;
            db.collection('chats').doc(chatRoomId).collection('messages').orderBy('timestamp', 'asc').onSnapshot((snapshot) => {
                const container = document.getElementById('chatMessages');
                if (snapshot.empty) return;
                
                let html = '';
                snapshot.forEach(doc => {
                    const msg = doc.data();
                    const isUser = msg.senderId === currentUser.uid || msg.sender === 'user' || msg.isUser === true;
                    const time = msg.timestamp?.toDate ? msg.timestamp.toDate().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }) : '';
                    
                    if (msg.type === 'image' || msg.imageUrl) {
                        html += `<div class="message ${isUser ? 'user-message' : 'support-message'}">
                                    <img src="${msg.imageUrl}" class="message-image" onclick="showImageModal('${msg.imageUrl}')">
                                    <div class="message-time">${time}</div>
                                </div>`;
                    } else {
                        html += `<div class="message ${isUser ? 'user-message' : 'support-message'}">
                                    ${escapeHtml(msg.text)}
                                    <div class="message-time">${time}</div>
                                </div>`;
                    }
                });
                container.innerHTML = html;
                container.scrollTop = container.scrollHeight;
            });

            // Clears 'adminUnread' flag automatically
            db.collection('chats').doc(chatRoomId).onSnapshot((doc) => {
                if (doc.exists) {
                    document.getElementById('typingIndicator').style.display = doc.data().adminTyping ? 'block' : 'none';
                    if (doc.data().adminUnread === true) {
                        db.collection('chats').doc(chatRoomId).update({ adminUnread: false }).catch(() => {});
                    }
                }
            });
        }

        async function sendMessage() {
            if (!chatRoomId) { alert("Please wait, connecting to server..."); return; }
            const input = document.getElementById('messageInput');
            const text = input.value.trim(); if (!text) return;
            input.value = '';
            
            try {
                await db.collection('chats').doc(chatRoomId).collection('messages').add({
                    senderId: currentUser.uid, 
                    senderName: currentUserData?.name || 'User', 
                    sender: 'user',
                    text: text, 
                    type: 'text', 
                    timestamp: firebase.firestore.FieldValue.serverTimestamp(), 
                    isUser: true
                });
                await db.collection('chats').doc(chatRoomId).set({ 
                    lastMessage: text, 
                    lastMessageTime: firebase.firestore.FieldValue.serverTimestamp(), 
                    lastUpdated: firebase.firestore.FieldValue.serverTimestamp(),
                    unread: true,
                    adminUnread: false
                }, { merge: true });
            } catch (e) { alert("Error sending message: " + e.message); }
        }

        async function sendImage(input) {
            if (!chatRoomId) { alert("Please wait, connecting to server..."); return; }
            const file = input.files[0]; if (!file) return;
            if (!file.type.startsWith('image/')) { alert('Select standard image formats'); return; }
            if (file.size > 5 * 1024 * 1024) { alert('File size must be under 5MB'); return; }

            const btn = document.querySelector('.image-btn');
            btn.disabled = true; btn.innerHTML = '..';

            try {
                const filename = `${Date.now()}_${file.name}`;
                const storageRef = storage.ref(`chat_images/${chatRoomId}/${filename}`);
                const snapshot = await storageRef.put(file);
                const imageUrl = await snapshot.ref.getDownloadURL();

                await db.collection('chats').doc(chatRoomId).collection('messages').add({
                    senderId: currentUser.uid, 
                    senderName: currentUserData?.name || 'User', 
                    sender: 'user',
                    imageUrl: imageUrl, 
                    type: 'image', 
                    timestamp: firebase.firestore.FieldValue.serverTimestamp(), 
                    isUser: true
                });
                await db.collection('chats').doc(chatRoomId).set({ 
                    lastMessage: '📷 Media Attachment', 
                    lastMessageTime: firebase.firestore.FieldValue.serverTimestamp(), 
                    lastUpdated: firebase.firestore.FieldValue.serverTimestamp(),
                    unread: true,
                    adminUnread: false 
                }, { merge: true });
            } catch (e) { alert("Image upload failed."); } 
            finally { btn.disabled = false; btn.innerHTML = '📷'; input.value = ''; }
        }

        function showImageModal(url) { document.getElementById('modalImage').src = url; document.getElementById('imageModal').style.display = 'flex'; }
        function closeImageModal() { document.getElementById('imageModal').style.display = 'none'; }
        function escapeHtml(str) { if (!str) return ''; return str.replace(/[&<>]/g, m => m === '&' ? '&amp;' : (m === '<' ? '&lt;' : '&gt;')); }
        function goBack() { window.location.href = 'dashboard.html'; }

        let typingTimeout;
        document.getElementById('messageInput').addEventListener('input', () => {
            if (!chatRoomId) return;
            db.collection('chats').doc(chatRoomId).update({ userTyping: true }).catch(() => {});
            clearTimeout(typingTimeout);
            typingTimeout = setTimeout(() => {
                if (chatRoomId) db.collection('chats').doc(chatRoomId).update({ userTyping: false }).catch(() => {});
            }, 1000);
        });

        window.sendMessage = sendMessage; 
        window.goBack = goBack; 
        window.sendImage = sendImage; 
        window.showImageModal = showImageModal; 
        window.closeImageModal = closeImageModal;
    </script>
</body>
</html>
