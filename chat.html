<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>GOGAMI - Live Support Chat</title>
    <!-- Supabase JS SDK v2 -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <!-- OneSignal SDK -->
    <script src="https://cdn.onesignal.com/sdks/web/v16/OneSignalSDK.page.js" defer></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
        body { background: #0f172a; color: #f8fafc; height: 100vh; display: flex; flex-direction: column; }
        .app-container { max-width: 480px; width: 100%; margin: 0 auto; background: #0f172a; height: 100vh; display: flex; flex-direction: column; position: relative; }
        
        .header { display: flex; align-items: center; justify-content: space-between; padding: 14px 16px; background: #1e293b; border-bottom: 1px solid #334155; }
        .back-btn { background: none; border: none; color: #94a3b8; font-size: 22px; cursor: pointer; }
        .title { font-weight: 800; font-size: 18px; color: #38bdf8; }
        .status-dot { width: 10px; height: 10px; background: #10b981; border-radius: 50%; display: inline-block; margin-right: 6px; }

        .chat-box { flex: 1; padding: 16px; overflow-y: auto; display: flex; flex-direction: column; gap: 12px; }
        .message-bubble { max-width: 75%; padding: 10px 14px; border-radius: 12px; font-size: 14px; line-height: 1.4; word-wrap: break-word; }
        .message-bubble.user { background: #3b82f6; color: #fff; align-self: flex-end; border-bottom-right-radius: 2px; }
        .message-bubble.admin { background: #1e293b; color: #f8fafc; border: 1px solid #334155; align-self: flex-start; border-bottom-left-radius: 2px; }
        .msg-time { font-size: 10px; opacity: 0.7; margin-top: 4px; text-align: right; }

        .input-bar { padding: 12px 16px; background: #1e293b; border-top: 1px solid #334155; display: flex; gap: 10px; align-items: center; }
        .input-bar input { flex: 1; padding: 12px; background: #0f172a; border: 1px solid #334155; border-radius: 20px; color: #fff; outline: none; font-size: 14px; }
        .send-btn { background: #3b82f6; color: #fff; border: none; padding: 10px 18px; border-radius: 20px; font-weight: 700; cursor: pointer; text-transform: uppercase; font-size: 13px; }
        
        .bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; max-width: 480px; margin: 0 auto; background: #1e293b; display: flex; justify-content: space-around; align-items: center; padding: 10px 6px 14px 6px; border-top: 1px solid #334155; z-index: 1000; height: 75px; }
        .nav-item { text-align: center; color: #94a3b8; cursor: pointer; font-size: 12px; flex: 1; font-weight: 600; text-decoration: none; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        .nav-item.active { color: #3b82f6; }
        .nav-item-home { position: relative; top: -20px; background: #3b82f6; color: #fff !important; width: 60px; height: 60px; border-radius: 50%; box-shadow: 0 4px 10px rgba(59, 130, 246, 0.4); border: 4px solid #0f172a; }
    </style>
</head>
<body>
<div class="app-container">
    <div class="header">
        <button class="back-btn" onclick="location.href='index.html'">←</button>
        <div class="title"><span class="status-dot"></span>Support Center</div>
        <div></div>
    </div>

    <div class="chat-box" id="chatContainer">
        <div style="text-align:center; color:#64748b; font-size:12px; padding:20px;">
            💬 Support Team online. Send a message to get instant help.
        </div>
    </div>

    <div class="input-bar" style="margin-bottom: 75px;">
        <input type="text" id="chatInput" placeholder="Type your issue or query...">
        <button class="send-btn" onclick="sendMessage()">Send</button>
    </div>

    <div class="bottom-nav">
        <a href="transactions.html" class="nav-item"><span>Passbook</span></a>
        <a href="mybids.html" class="nav-item"><span>My Bids</span></a>
        <a href="index.html" class="nav-item nav-item-home"><span>Home</span></a>
        <a href="funds.html" class="nav-item"><span>Funds</span></a>
        <a href="chat.html" class="nav-item active"><span>Support</span></a>
    </div>
</div>

<script>
    const SUPABASE_URL = "https://lcrzohaqjzwjhsyncaim.supabase.co";
    const SUPABASE_ANON_KEY = "sb_publishable_2iAoTgXx8S5XeWy04oiICA_nedHJR_R";
    const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    let currentUserId = null;
    let chatId = null;

    function getSafeUid() {
        return localStorage.getItem('userUid') || localStorage.getItem('uid');
    }

    // OneSignal Push Init
    window.OneSignalDeferred = window.OneSignalDeferred || [];
    OneSignalDeferred.push(async function(OneSignal) {
        const { data } = await supabaseClient.from('settings').select('value').eq('id', 'onesignal_appid').single();
        if(data && data.value) {
            await OneSignal.init({ appId: data.value });
        }
    });

    window.onload = async () => {
        currentUserId = getSafeUid();
        if(!currentUserId) {
            location.href = 'index.html';
            return;
        }
        
        chatId = 'chat_' + currentUserId;
        await ensureChatRoomExists();
        await loadMessages();
        subscribeToMessages();
    };

    async function ensureChatRoomExists() {
        const { data: existingChat } = await supabaseClient.from('chats').select('*').eq('id', chatId).single();
        
        if(!existingChat) {
            const { data: user } = await supabaseClient.from('users').select('*').eq('id', currentUserId).single();
            await supabaseClient.from('chats').insert([{
                id: chatId,
                user_id: currentUserId,
                user_name: user?.name || 'User ' + currentUserId.substring(0, 5),
                user_phone: user?.phone || '',
                last_message: 'Chat room initialized',
                last_message_time: new Date().toISOString()
            }]);
        }
    }

    async function loadMessages() {
        const { data: msgs } = await supabaseClient.from('chat_messages').select('*').eq('chat_id', chatId).order('timestamp', { ascending: true });
        let container = document.getElementById('chatContainer');
        
        if(!msgs || msgs.length === 0) return;

        container.innerHTML = msgs.map(m => `
            <div class="message-bubble ${m.is_admin ? 'admin' : 'user'}">
                ${m.text}
                <div class="msg-time">${new Date(m.timestamp).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'})}</div>
            </div>
        `).join('');

        container.scrollTop = container.scrollHeight;
    }

    async function sendMessage() {
        let input = document.getElementById('chatInput');
        let txt = input.value.trim();
        if(!txt) return;

        input.value = '';

        // Add to Chat Messages Table
        await supabaseClient.from('chat_messages').insert([{
            chat_id: chatId,
            sender_id: currentUserId,
            text: txt,
            is_user: true,
            is_admin: false
        }]);

        // Update Main Chat Room Status
        await supabaseClient.from('chats').update({
            last_message: txt,
            last_message_time: new Date().toISOString(),
            unread: true
        }).eq('id', chatId);

        loadMessages();
    }

    function subscribeToMessages() {
        supabaseClient.channel('public:chat_messages:' + chatId)
            .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'chat_messages', filter: `chat_id=eq.${chatId}` }, () => {
                loadMessages();
            }).subscribe();
    }
</script>
</body>
</html>
