<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>GOGAMI - Result Panel Charts</title>
    <!-- Supabase JS SDK v2 -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
        body { background: #0f172a; color: #f8fafc; padding: 16px; }
        .app-container { max-width: 600px; margin: 0 auto; }
        .header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; }
        .back-btn { background: #1e293b; border: 1px solid #334155; color: #fff; padding: 8px 14px; border-radius: 8px; cursor: pointer; font-weight: bold; }
        .title { color: #38bdf8; font-size: 18px; font-weight: 800; }
        .chart-card { background: #1e293b; border-radius: 12px; padding: 16px; border: 1px solid #334155; margin-bottom: 16px; }
        .market-header { font-size: 16px; font-weight: 700; color: #f8fafc; margin-bottom: 10px; text-transform: uppercase; border-bottom: 1px solid #334155; padding-bottom: 6px; display: flex; justify-content: space-between; }
        .result-number { font-family: monospace; font-size: 18px; color: #10b981; font-weight: 800; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th, td { padding: 8px; text-align: center; border: 1px solid #334155; font-size: 12px; }
        th { background: #0f172a; color: #94a3b8; }
        .jodi-cell { color: #f59e0b; font-weight: 800; }
    </style>
</head>
<body>
<div class="app-container">
    <div class="header">
        <button class="back-btn" onclick="window.history.back()">← Back</button>
        <span class="title">📊 RESULT CHARTS</span>
        <div></div>
    </div>

    <div id="chartsContainer">
        <div style="text-align: center; color: #94a3b8; padding: 40px;">Loading live charts...</div>
    </div>
</div>

<script>
    const SUPABASE_URL = "https://lcrzohaqjzwjhsyncaim.supabase.co";
    const SUPABASE_ANON_KEY = "sb_publishable_2iAoTgXx8S5XeWy04oiICA_nedHJR_R";
    const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    window.onload = () => {
        loadCharts();
    };

    async function loadCharts() {
        const { data: markets } = await supabaseClient.from('markets').select('*').order('serial_no', { ascending: true });
        let container = document.getElementById('chartsContainer');

        if(!markets || markets.length === 0) {
            container.innerHTML = '<div style="text-align:center; color:#94a3b8; padding:40px;">No panel chart records available</div>';
            return;
        }

        container.innerHTML = markets.map(m => `
            <div class="chart-card">
                <div class="market-header">
                    <span>${m.name}</span>
                    <span class="result-number">${m.numbers || '***-**-***'}</span>
                </div>
                <table>
                    <thead>
                        <tr>
                            <th>Open Pana</th>
                            <th>Jodi</th>
                            <th>Close Pana</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr>
                            <td>${m.open_pana || '***'}</td>
                            <td class="jodi-cell">${m.jodi || (m.open_digit && m.close_digit ? m.open_digit + m.close_digit : '**')}</td>
                            <td>${m.close_pana || '***'}</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        `).join('');
    }
</script>
</body>
</html>
